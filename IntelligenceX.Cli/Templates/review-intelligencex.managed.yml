# INTELLIGENCEX:BEGIN
review:
  permissions:
    contents: read
    pull-requests: write
    issues: write
    id-token: write
  uses: {{ActionsRepo}}/.github/workflows/review-intelligencex-reusable.yml@{{ActionsRef}}
  with:
    runs_on: {{RunsOn}}
    reviewer_source: {{ReviewerSource}}
    reviewer_release_repo: {{ReviewerReleaseRepo}}
    reviewer_release_tag: {{ReviewerReleaseTag}}
    {{ReviewerReleaseAssetLine}}
    {{ReviewerReleaseUrlLine}}
    repo: ${{ github.event.pull_request.number && github.repository || inputs.repo }}
    pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    provider: {{Provider}}
    model: {{Model}}
    openai_model: ${{ inputs.openai_model }}
    openai_transport: {{OpenAITransport}}
    openai_account_id: ${{ inputs.openai_account_id }}
    openai_account_ids: ${{ inputs.openai_account_ids }}
    openai_account_rotation: ${{ inputs.openai_account_rotation }}
    openai_account_failover: ${{ inputs.openai_account_failover }}
    usage_budget_guard: ${{ inputs.usage_budget_guard }}
    usage_budget_allow_credits: ${{ inputs.usage_budget_allow_credits }}
    usage_budget_allow_weekly_limit: ${{ inputs.usage_budget_allow_weekly_limit }}
    include_issue_comments: {{IncludeIssueComments}}
    include_review_comments: {{IncludeReviewComments}}
    include_related_prs: {{IncludeRelatedPullRequests}}
    progress_updates: {{ProgressUpdates}}
    diagnostics: {{Diagnostics}}
    preflight: {{Preflight}}
    preflight_timeout_seconds: {{PreflightTimeoutSeconds}}
    cleanup_enabled: {{CleanupEnabled}}
    cleanup_mode: {{CleanupMode}}
    cleanup_scope: {{CleanupScope}}
    cleanup_require_label: {{CleanupRequireLabel}}
    cleanup_min_confidence: {{CleanupMinConfidence}}
    cleanup_allowed_edits: {{CleanupAllowedEdits}}
    cleanup_post_edit_comment: {{CleanupPostEditComment}}
  secrets: inherit
# INTELLIGENCEX:END
