name: Triage Index Sweep

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Max open PRs to scan"
        required: false
        default: "500"
      max_issues:
        description: "Max open issues to scan"
        required: false
        default: "500"
      duplicate_threshold:
        description: "Duplicate confidence threshold"
        required: false
        default: "0.82"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build triage index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_PRS="${{ github.event.inputs.max_prs }}"
          MAX_ISSUES="${{ github.event.inputs.max_issues }}"
          DUP_THRESHOLD="${{ github.event.inputs.duplicate_threshold }}"
          if [ -z "$MAX_PRS" ]; then MAX_PRS="500"; fi
          if [ -z "$MAX_ISSUES" ]; then MAX_ISSUES="500"; fi
          if [ -z "$DUP_THRESHOLD" ]; then DUP_THRESHOLD="0.82"; fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo build-triage-index \
            --repo "${{ github.repository }}" \
            --max-prs "$MAX_PRS" \
            --max-issues "$MAX_ISSUES" \
            --duplicate-threshold "$DUP_THRESHOLD" \
            --out artifacts/triage/ix-triage-index.json \
            --summary artifacts/triage/ix-triage-index.md

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ix-triage-index
          path: artifacts/triage

      - name: Comment summary on control issue (optional)
        if: ${{ vars.IX_TRIAGE_CONTROL_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- intelligencex:triage-index-summary -->"
          DASHBOARD_MARKER="<!-- intelligencex:triage-control-dashboard -->"
          ISSUE="${{ vars.IX_TRIAGE_CONTROL_ISSUE }}"
          SUMMARY_FILE="artifacts/triage/ix-triage-index-control-summary.md"
          DASHBOARD_FILE="artifacts/triage/ix-triage-control-dashboard.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GENERATED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          {
            echo "$MARKER"
            echo "# IX Triage Index Sweep"
            echo
            echo "- Generated: $GENERATED_AT"
            echo "- Repo: \`${{ github.repository }}\`"
            echo "- Workflow run: $RUN_URL"
            echo
            if [ -f artifacts/triage/ix-triage-index.md ]; then
              cat artifacts/triage/ix-triage-index.md
            else
              echo "_No triage summary file found at artifacts/triage/ix-triage-index.md._"
            fi
          } > "$SUMMARY_FILE"

          if [ -f "$SUMMARY_FILE" ]; then
            EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-index-summary -->")) | .id' \
              | tail -n 1)"

            if [ -n "$EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
                -F "body=@$SUMMARY_FILE" > /dev/null
              SUMMARY_COMMENT_ID="$EXISTING_ID"
            else
              SUMMARY_COMMENT_ID="$(gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$SUMMARY_FILE" \
                --jq '.id')"
            fi

            PROJECT_SYNC_COMMENT_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-project-sync-summary -->")) | .id' \
              | tail -n 1)"

            TRIAGE_INDEX_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$SUMMARY_COMMENT_ID"
            if [ -n "$PROJECT_SYNC_COMMENT_ID" ]; then
              PROJECT_SYNC_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$PROJECT_SYNC_COMMENT_ID"
            else
              PROJECT_SYNC_LINK=""
            fi

            {
              echo "$DASHBOARD_MARKER"
              echo "# IX Triage Control Dashboard"
              echo
              echo "- Updated: $GENERATED_AT"
              echo "- Repo: \`${{ github.repository }}\`"
              echo "- Workflow run: $RUN_URL"
              echo
              echo "## Latest Summaries"
              echo
              echo "- Triage Index Sweep: $TRIAGE_INDEX_LINK"
              if [ -n "$PROJECT_SYNC_LINK" ]; then
                echo "- Triage Project Sync: $PROJECT_SYNC_LINK"
              else
                echo "- Triage Project Sync: _not available yet_"
              fi
            } > "$DASHBOARD_FILE"

            DASHBOARD_EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-control-dashboard -->")) | .id' \
              | tail -n 1)"

            if [ -n "$DASHBOARD_EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$DASHBOARD_EXISTING_ID" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            else
              gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            fi
          fi
