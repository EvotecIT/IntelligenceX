name: Triage Project Sync

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "Project owner login (user or organization)"
        required: false
        default: "{{Owner}}"
      project_number:
        description: "Project number"
        required: false
        default: "{{ProjectNumber}}"
      max_items:
        description: "Max entries to sync"
        required: false
        default: "{{MaxItems}}"
      drift_threshold:
        description: "Vision drift threshold for fail-on-drift gate (0-1)"
        required: false
        default: "{{VisionDriftThreshold}}"
      apply_pr_watch_governance_labels:
        description: "When true, sync the optional managed PR governance label from live pr-watch tracker state"
        required: false
        default: false
        type: boolean
      apply_pr_watch_governance_fields:
        description: "When true, sync optional PR governance fields from live pr-watch tracker state"
        required: false
        default: false
        type: boolean
      include_pr_watch_governance_views:
        description: "When true, include the optional governance review view profile in the project-view apply plan"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0.x"

      - name: Build triage index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo build-triage-index \
            --repo "${{ github.repository }}" \
            --max-prs 1000 \
            --max-issues 1000 \
            --out artifacts/triage/ix-triage-index.json \
            --summary artifacts/triage/ix-triage-index.md

      - name: Run vision check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRIFT_THRESHOLD="${{ github.event.inputs.drift_threshold }}"
          if [ -z "$DRIFT_THRESHOLD" ]; then DRIFT_THRESHOLD="{{VisionDriftThreshold}}"; fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo vision-check \
            --repo "${{ github.repository }}" \
            --vision VISION.md \
            --no-refresh-index \
            --index artifacts/triage/ix-triage-index.json \
            --enforce-contract \
            --fail-on-drift \
            --drift-threshold "$DRIFT_THRESHOLD" \
            --out artifacts/triage/ix-vision-check.json \
            --summary artifacts/triage/ix-vision-check.md

      - name: Run issue review signals
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo issue-review \
            --repo "${{ github.repository }}" \
            --proposal-only \
            --state-path artifacts/triage/ix-issue-review-state.json \
            --out artifacts/triage/ix-issue-review.json \
            --summary artifacts/triage/ix-issue-review.md

      - name: Sync into GitHub Project
        env:
          GH_TOKEN: ${{ secrets.IX_PROJECT_TOKEN != '' && secrets.IX_PROJECT_TOKEN || github.token }}
        run: |
          OWNER="${{ github.event.inputs.owner }}"
          if [ -z "$OWNER" ]; then OWNER="{{Owner}}"; fi

          PROJECT_NUMBER="${{ github.event.inputs.project_number }}"
          if [ -z "$PROJECT_NUMBER" ]; then PROJECT_NUMBER="{{ProjectNumber}}"; fi

          MAX_ITEMS="${{ github.event.inputs.max_items }}"
          if [ -z "$MAX_ITEMS" ]; then MAX_ITEMS="{{MaxItems}}"; fi

          APPLY_PR_WATCH_GOVERNANCE_LABELS="${{ vars.IX_TRIAGE_APPLY_PR_WATCH_GOVERNANCE_LABELS }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APPLY_PR_WATCH_GOVERNANCE_LABELS="${{ inputs.apply_pr_watch_governance_labels }}"
          fi

          APPLY_PR_WATCH_GOVERNANCE_FIELDS="${{ vars.IX_TRIAGE_APPLY_PR_WATCH_GOVERNANCE_FIELDS }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APPLY_PR_WATCH_GOVERNANCE_FIELDS="${{ inputs.apply_pr_watch_governance_fields }}"
          fi

          EXTRA_ARGS=()
          if [ "$APPLY_PR_WATCH_GOVERNANCE_LABELS" = "true" ]; then
            EXTRA_ARGS+=(--apply-pr-watch-governance-labels)
          fi
          if [ "$APPLY_PR_WATCH_GOVERNANCE_FIELDS" = "true" ]; then
            EXTRA_ARGS+=(--apply-pr-watch-governance-fields)
          fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo project-sync \
            --owner "$OWNER" \
            --project "$PROJECT_NUMBER" \
            --triage artifacts/triage/ix-triage-index.json \
            --vision artifacts/triage/ix-vision-check.json \
            --issue-review artifacts/triage/ix-issue-review.json \
            --max-items "$MAX_ITEMS" \
            --apply-labels \
            --apply-link-comments \
            ${EXTRA_ARGS[@]}

      - name: Build project view apply plan
        env:
          GH_TOKEN: ${{ secrets.IX_PROJECT_TOKEN != '' && secrets.IX_PROJECT_TOKEN || github.token }}
        run: |
          OWNER="${{ github.event.inputs.owner }}"
          if [ -z "$OWNER" ]; then OWNER="{{Owner}}"; fi

          PROJECT_NUMBER="${{ github.event.inputs.project_number }}"
          if [ -z "$PROJECT_NUMBER" ]; then PROJECT_NUMBER="{{ProjectNumber}}"; fi

          INCLUDE_PR_WATCH_GOVERNANCE_VIEWS="${{ vars.IX_TRIAGE_INCLUDE_PR_WATCH_GOVERNANCE_VIEWS }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INCLUDE_PR_WATCH_GOVERNANCE_VIEWS="${{ inputs.include_pr_watch_governance_views }}"
          fi

          VIEW_ARGS=()
          if [ "$INCLUDE_PR_WATCH_GOVERNANCE_VIEWS" = "true" ]; then
            VIEW_ARGS+=(--include-pr-watch-governance-views)
          fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo project-view-apply \
            --repo "${{ github.repository }}" \
            --owner "$OWNER" \
            --project "$PROJECT_NUMBER" \
            --out artifacts/triage/ix-project-view-apply.md \
            ${VIEW_ARGS[@]}

      - name: Upload triage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ix-triage-project-sync
          path: artifacts/triage

      - name: Comment summary on control issue (optional)
        if: ${{ vars.IX_TRIAGE_CONTROL_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- intelligencex:triage-project-sync-summary -->"
          DASHBOARD_MARKER="<!-- intelligencex:triage-control-dashboard -->"
          ISSUE="${{ vars.IX_TRIAGE_CONTROL_ISSUE }}"
          SUMMARY_FILE="artifacts/triage/ix-triage-project-sync-summary.md"
          DASHBOARD_FILE="artifacts/triage/ix-triage-control-dashboard.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GENERATED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          {
            echo "$MARKER"
            echo "# IX Triage Project Sync"
            echo
            echo "- Generated: $GENERATED_AT"
            echo "- Repo: \`${{ github.repository }}\`"
            echo "- Workflow run: $RUN_URL"
            echo

            if [ -f artifacts/triage/ix-triage-index.md ]; then
              echo "## Triage Index"
              echo
              cat artifacts/triage/ix-triage-index.md
              echo
            fi

            if [ -f artifacts/triage/ix-vision-check.md ]; then
              echo "## Vision Check"
              echo
              cat artifacts/triage/ix-vision-check.md
              echo
            fi

            if [ -f artifacts/triage/ix-issue-review.md ]; then
              echo "## Issue Review"
              echo
              cat artifacts/triage/ix-issue-review.md
              echo
            fi

            if [ -f artifacts/triage/ix-project-view-apply.md ]; then
              echo "## Project View Apply Plan"
              echo
              cat artifacts/triage/ix-project-view-apply.md
              echo
            fi
          } > "$SUMMARY_FILE"

          if [ -f "$SUMMARY_FILE" ]; then
            EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-project-sync-summary -->")) | .id' \
              | tail -n 1)"

            if [ -n "$EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
                -F "body=@$SUMMARY_FILE" > /dev/null
              SUMMARY_COMMENT_ID="$EXISTING_ID"
            else
              SUMMARY_COMMENT_ID="$(gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$SUMMARY_FILE" \
                --jq '.id')"
            fi

            TRIAGE_INDEX_COMMENT_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-index-summary -->")) | .id' \
              | tail -n 1)"
            BOOTSTRAP_LINKS_COMMENT_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-bootstrap-links -->")) | .id' \
              | tail -n 1)"

            CONTROL_ISSUE_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE"
            VISION_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/VISION.md"
            PROJECT_SYNC_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$SUMMARY_COMMENT_ID"
            if [ -n "$TRIAGE_INDEX_COMMENT_ID" ]; then
              TRIAGE_INDEX_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$TRIAGE_INDEX_COMMENT_ID"
            else
              TRIAGE_INDEX_LINK=""
            fi
            if [ -n "$BOOTSTRAP_LINKS_COMMENT_ID" ]; then
              BOOTSTRAP_LINKS_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$BOOTSTRAP_LINKS_COMMENT_ID"
            else
              BOOTSTRAP_LINKS_LINK=""
            fi

            PROJECT_VIEW_APPLY_ISSUE="${{ vars.IX_PROJECT_VIEW_APPLY_ISSUE }}"
            if [ -n "$PROJECT_VIEW_APPLY_ISSUE" ]; then
              PROJECT_VIEW_APPLY_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$PROJECT_VIEW_APPLY_ISSUE"
            else
              PROJECT_VIEW_APPLY_LINK=""
            fi

            PROJECT_URL=""
            PROJECT_CONFIG_PATH="artifacts/triage/ix-project-config.json"
            if [ -f "$PROJECT_CONFIG_PATH" ] && command -v jq >/dev/null 2>&1; then
              PROJECT_URL="$(jq -r '.project.url // empty' "$PROJECT_CONFIG_PATH" 2>/dev/null || true)"
            fi

            PR_WATCH_GOVERNANCE_SOURCE=""
            PR_WATCH_GOVERNANCE_LINK=""
            PR_WATCH_GOVERNANCE_STATUS=""
            PR_WATCH_WEEKLY_GOVERNANCE="$(gh api --paginate \
              "repos/${{ github.repository }}/issues?state=open&per_page=100" \
              --jq '.[] | select((.pull_request | not) and ((.body // "") | contains("<!-- intelligencex:pr-watch-rollup-tracker:weekly-governance -->"))) | "\(.html_url)\t\(((.body // "") | split("\n") | map(select(startswith("- Governance: "))) | .[0] // "" | ltrimstr("- Governance: "))"' \
              | head -n 1)"
            if [ -n "$PR_WATCH_WEEKLY_GOVERNANCE" ]; then
              PR_WATCH_GOVERNANCE_SOURCE="weekly-governance"
              PR_WATCH_GOVERNANCE_LINK="$(printf '%s' "$PR_WATCH_WEEKLY_GOVERNANCE" | cut -f1)"
              PR_WATCH_GOVERNANCE_STATUS="$(printf '%s' "$PR_WATCH_WEEKLY_GOVERNANCE" | cut -f2-)"
            else
              PR_WATCH_SCHEDULE_GOVERNANCE="$(gh api --paginate \
                "repos/${{ github.repository }}/issues?state=open&per_page=100" \
                --jq '.[] | select((.pull_request | not) and ((.body // "") | contains("<!-- intelligencex:pr-watch-rollup-tracker:schedule -->"))) | "\(.html_url)\t\(((.body // "") | split("\n") | map(select(startswith("- Governance: "))) | .[0] // "" | ltrimstr("- Governance: "))"' \
                | head -n 1)"
              if [ -n "$PR_WATCH_SCHEDULE_GOVERNANCE" ]; then
                PR_WATCH_GOVERNANCE_SOURCE="schedule"
                PR_WATCH_GOVERNANCE_LINK="$(printf '%s' "$PR_WATCH_SCHEDULE_GOVERNANCE" | cut -f1)"
                PR_WATCH_GOVERNANCE_STATUS="$(printf '%s' "$PR_WATCH_SCHEDULE_GOVERNANCE" | cut -f2-)"
              fi
            fi

            {
              echo "$DASHBOARD_MARKER"
              echo "# IX Triage Control Dashboard"
              echo
              echo "- Updated: $GENERATED_AT"
              echo "- Repo: \`${{ github.repository }}\`"
              echo "- Workflow run: $RUN_URL"
              echo
              echo "## Latest Summaries"
              echo
              if [ -n "$TRIAGE_INDEX_LINK" ]; then
                echo "- Triage Index Sweep: $TRIAGE_INDEX_LINK"
              else
                echo "- Triage Index Sweep: _not available yet_"
              fi
              echo "- Triage Project Sync: $PROJECT_SYNC_LINK"
              if [ -n "$PR_WATCH_GOVERNANCE_LINK" ]; then
                echo "- PR Babysit Governance ($PR_WATCH_GOVERNANCE_SOURCE): $PR_WATCH_GOVERNANCE_LINK"
              else
                echo "- PR Babysit Governance: _not available yet_"
              fi
              echo
              echo "## PR Babysit Governance"
              echo
              if [ -n "$PR_WATCH_GOVERNANCE_LINK" ]; then
                echo "- Source: \`$PR_WATCH_GOVERNANCE_SOURCE\`"
                echo "- Tracker issue: $PR_WATCH_GOVERNANCE_LINK"
                if [ -n "$PR_WATCH_GOVERNANCE_STATUS" ]; then
                  echo "- Governance status: $PR_WATCH_GOVERNANCE_STATUS"
                else
                  echo "- Governance status: _tracker found, but no compact governance line was present_"
                fi
              else
                echo "- Governance status: _not available yet_"
              fi
              echo
              echo "## Maintainer Quick Links"
              echo
              echo "- Control issue: $CONTROL_ISSUE_LINK"
              echo "- Vision doc: $VISION_URL"
              if [ -n "$PROJECT_URL" ]; then
                echo "- Project board: $PROJECT_URL"
              else
                echo "- Project board: _not available (missing artifacts/triage/ix-project-config.json or jq)_"
              fi
              if [ -n "$PROJECT_VIEW_APPLY_LINK" ]; then
                echo "- Project view apply issue: $PROJECT_VIEW_APPLY_LINK"
              else
                echo "- Project view apply issue: _not configured (IX_PROJECT_VIEW_APPLY_ISSUE)_"
              fi
              if [ -n "$BOOTSTRAP_LINKS_LINK" ]; then
                echo "- Bootstrap links comment: $BOOTSTRAP_LINKS_LINK"
              else
                echo "- Bootstrap links comment: _not available yet_"
              fi
            } > "$DASHBOARD_FILE"

            DASHBOARD_EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-control-dashboard -->")) | .id' \
              | tail -n 1)"

            if [ -n "$DASHBOARD_EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$DASHBOARD_EXISTING_ID" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            else
              gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            fi
          fi
