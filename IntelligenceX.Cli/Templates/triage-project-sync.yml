name: Triage Project Sync

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "Project owner login (user or organization)"
        required: false
        default: "{{Owner}}"
      project_number:
        description: "Project number"
        required: false
        default: "{{ProjectNumber}}"
      max_items:
        description: "Max entries to sync"
        required: false
        default: "{{MaxItems}}"

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build triage index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo build-triage-index \
            --repo "${{ github.repository }}" \
            --max-prs 1000 \
            --max-issues 1000 \
            --out artifacts/triage/ix-triage-index.json \
            --summary artifacts/triage/ix-triage-index.md

      - name: Run vision check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo vision-check \
            --repo "${{ github.repository }}" \
            --vision VISION.md \
            --no-refresh-index \
            --index artifacts/triage/ix-triage-index.json \
            --enforce-contract \
            --fail-on-drift \
            --drift-threshold 0.70 \
            --out artifacts/triage/ix-vision-check.json \
            --summary artifacts/triage/ix-vision-check.md

      - name: Sync into GitHub Project
        env:
          GH_TOKEN: ${{ secrets.IX_PROJECT_TOKEN != '' && secrets.IX_PROJECT_TOKEN || github.token }}
        run: |
          OWNER="${{ github.event.inputs.owner }}"
          if [ -z "$OWNER" ]; then OWNER="{{Owner}}"; fi

          PROJECT_NUMBER="${{ github.event.inputs.project_number }}"
          if [ -z "$PROJECT_NUMBER" ]; then PROJECT_NUMBER="{{ProjectNumber}}"; fi

          MAX_ITEMS="${{ github.event.inputs.max_items }}"
          if [ -z "$MAX_ITEMS" ]; then MAX_ITEMS="{{MaxItems}}"; fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo project-sync \
            --owner "$OWNER" \
            --project "$PROJECT_NUMBER" \
            --triage artifacts/triage/ix-triage-index.json \
            --vision artifacts/triage/ix-vision-check.json \
            --max-items "$MAX_ITEMS" \
            --apply-labels \
            --apply-link-comments

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ix-triage-project-sync
          path: artifacts/triage

      - name: Comment summary on control issue (optional)
        if: ${{ vars.IX_TRIAGE_CONTROL_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- intelligencex:triage-project-sync-summary -->"
          DASHBOARD_MARKER="<!-- intelligencex:triage-control-dashboard -->"
          ISSUE="${{ vars.IX_TRIAGE_CONTROL_ISSUE }}"
          SUMMARY_FILE="artifacts/triage/ix-triage-project-sync-summary.md"
          DASHBOARD_FILE="artifacts/triage/ix-triage-control-dashboard.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GENERATED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          {
            echo "$MARKER"
            echo "# IX Triage Project Sync"
            echo
            echo "- Generated: $GENERATED_AT"
            echo "- Repo: \`${{ github.repository }}\`"
            echo "- Workflow run: $RUN_URL"
            echo

            if [ -f artifacts/triage/ix-triage-index.md ]; then
              echo "## Triage Index"
              echo
              cat artifacts/triage/ix-triage-index.md
              echo
            fi

            if [ -f artifacts/triage/ix-vision-check.md ]; then
              echo "## Vision Check"
              echo
              cat artifacts/triage/ix-vision-check.md
              echo
            fi
          } > "$SUMMARY_FILE"

          if [ -f "$SUMMARY_FILE" ]; then
            EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-project-sync-summary -->")) | .id' \
              | tail -n 1)"

            if [ -n "$EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
                -F "body=@$SUMMARY_FILE" > /dev/null
              SUMMARY_COMMENT_ID="$EXISTING_ID"
            else
              SUMMARY_COMMENT_ID="$(gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$SUMMARY_FILE" \
                --jq '.id')"
            fi

            TRIAGE_INDEX_COMMENT_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-index-summary -->")) | .id' \
              | tail -n 1)"
            BOOTSTRAP_LINKS_COMMENT_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-bootstrap-links -->")) | .id' \
              | tail -n 1)"

            CONTROL_ISSUE_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE"
            VISION_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/VISION.md"
            PROJECT_SYNC_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$SUMMARY_COMMENT_ID"
            if [ -n "$TRIAGE_INDEX_COMMENT_ID" ]; then
              TRIAGE_INDEX_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$TRIAGE_INDEX_COMMENT_ID"
            else
              TRIAGE_INDEX_LINK=""
            fi
            if [ -n "$BOOTSTRAP_LINKS_COMMENT_ID" ]; then
              BOOTSTRAP_LINKS_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$ISSUE#issuecomment-$BOOTSTRAP_LINKS_COMMENT_ID"
            else
              BOOTSTRAP_LINKS_LINK=""
            fi

            PROJECT_VIEW_APPLY_ISSUE="${{ vars.IX_PROJECT_VIEW_APPLY_ISSUE }}"
            if [ -n "$PROJECT_VIEW_APPLY_ISSUE" ]; then
              PROJECT_VIEW_APPLY_LINK="${{ github.server_url }}/${{ github.repository }}/issues/$PROJECT_VIEW_APPLY_ISSUE"
            else
              PROJECT_VIEW_APPLY_LINK=""
            fi

            PROJECT_URL=""
            PROJECT_CONFIG_PATH="artifacts/triage/ix-project-config.json"
            if [ -f "$PROJECT_CONFIG_PATH" ] && command -v jq >/dev/null 2>&1; then
              PROJECT_URL="$(jq -r '.project.url // empty' "$PROJECT_CONFIG_PATH" 2>/dev/null || true)"
            fi

            {
              echo "$DASHBOARD_MARKER"
              echo "# IX Triage Control Dashboard"
              echo
              echo "- Updated: $GENERATED_AT"
              echo "- Repo: \`${{ github.repository }}\`"
              echo "- Workflow run: $RUN_URL"
              echo
              echo "## Latest Summaries"
              echo
              if [ -n "$TRIAGE_INDEX_LINK" ]; then
                echo "- Triage Index Sweep: $TRIAGE_INDEX_LINK"
              else
                echo "- Triage Index Sweep: _not available yet_"
              fi
              echo "- Triage Project Sync: $PROJECT_SYNC_LINK"
              echo
              echo "## Maintainer Quick Links"
              echo
              echo "- Control issue: $CONTROL_ISSUE_LINK"
              echo "- Vision doc: $VISION_URL"
              if [ -n "$PROJECT_URL" ]; then
                echo "- Project board: $PROJECT_URL"
              else
                echo "- Project board: _not available (missing artifacts/triage/ix-project-config.json or jq)_"
              fi
              if [ -n "$PROJECT_VIEW_APPLY_LINK" ]; then
                echo "- Project view apply issue: $PROJECT_VIEW_APPLY_LINK"
              else
                echo "- Project view apply issue: _not configured (IX_PROJECT_VIEW_APPLY_ISSUE)_"
              fi
              if [ -n "$BOOTSTRAP_LINKS_LINK" ]; then
                echo "- Bootstrap links comment: $BOOTSTRAP_LINKS_LINK"
              else
                echo "- Bootstrap links comment: _not available yet_"
              fi
            } > "$DASHBOARD_FILE"

            DASHBOARD_EXISTING_ID="$(gh api --paginate \
              "repos/${{ github.repository }}/issues/$ISSUE/comments" \
              --jq '.[] | select(.body | contains("<!-- intelligencex:triage-control-dashboard -->")) | .id' \
              | tail -n 1)"

            if [ -n "$DASHBOARD_EXISTING_ID" ]; then
              gh api \
                --method PATCH \
                "repos/${{ github.repository }}/issues/comments/$DASHBOARD_EXISTING_ID" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            else
              gh api \
                --method POST \
                "repos/${{ github.repository }}/issues/$ISSUE/comments" \
                -F "body=@$DASHBOARD_FILE" > /dev/null
            fi
          fi
