name: Triage Project Sync

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "Project owner login (user or organization)"
        required: false
        default: "{{Owner}}"
      project_number:
        description: "Project number"
        required: false
        default: "{{ProjectNumber}}"
      max_items:
        description: "Max entries to sync"
        required: false
        default: "{{MaxItems}}"

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build triage index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo build-triage-index \
            --repo "${{ github.repository }}" \
            --max-prs 1000 \
            --max-issues 1000 \
            --out artifacts/triage/ix-triage-index.json \
            --summary artifacts/triage/ix-triage-index.md

      - name: Run vision check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo vision-check \
            --repo "${{ github.repository }}" \
            --vision VISION.md \
            --no-refresh-index \
            --index artifacts/triage/ix-triage-index.json \
            --out artifacts/triage/ix-vision-check.json \
            --summary artifacts/triage/ix-vision-check.md

      - name: Sync into GitHub Project
        env:
          GH_TOKEN: ${{ secrets.IX_PROJECT_TOKEN != '' && secrets.IX_PROJECT_TOKEN || github.token }}
        run: |
          OWNER="${{ github.event.inputs.owner }}"
          if [ -z "$OWNER" ]; then OWNER="{{Owner}}"; fi

          PROJECT_NUMBER="${{ github.event.inputs.project_number }}"
          if [ -z "$PROJECT_NUMBER" ]; then PROJECT_NUMBER="{{ProjectNumber}}"; fi

          MAX_ITEMS="${{ github.event.inputs.max_items }}"
          if [ -z "$MAX_ITEMS" ]; then MAX_ITEMS="{{MaxItems}}"; fi

          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- \
            todo project-sync \
            --owner "$OWNER" \
            --project "$PROJECT_NUMBER" \
            --triage artifacts/triage/ix-triage-index.json \
            --vision artifacts/triage/ix-vision-check.json \
            --max-items "$MAX_ITEMS" \
            --apply-labels \
            --apply-link-comments

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ix-triage-project-sync
          path: artifacts/triage

      - name: Comment summary on control issue (optional)
        if: ${{ vars.IX_TRIAGE_CONTROL_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ vars.IX_TRIAGE_CONTROL_ISSUE }}"
          SUMMARY_FILE="artifacts/triage/ix-triage-project-sync-summary.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GENERATED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          {
            echo "# IX Triage Project Sync"
            echo
            echo "- Generated: $GENERATED_AT"
            echo "- Repo: \`${{ github.repository }}\`"
            echo "- Workflow run: $RUN_URL"
            echo

            if [ -f artifacts/triage/ix-triage-index.md ]; then
              echo "## Triage Index"
              echo
              cat artifacts/triage/ix-triage-index.md
              echo
            fi

            if [ -f artifacts/triage/ix-vision-check.md ]; then
              echo "## Vision Check"
              echo
              cat artifacts/triage/ix-vision-check.md
              echo
            fi
          } > "$SUMMARY_FILE"

          if [ -f "$SUMMARY_FILE" ]; then
            gh issue comment "$ISSUE" --repo "${{ github.repository }}" --body-file "$SUMMARY_FILE"
          fi
