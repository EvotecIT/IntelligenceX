<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#0A0E1A"/>
  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#141824"/>
  <rect y="28" width="800" height="12" fill="#141824"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="6" fill="#28C840"/>
  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" fill="#8892B0" font-family="monospace" font-size="13">PowerShell</text>

  <!-- PS prompt 1 -->
  <text x="24" y="66" fill="#00D9FF" font-family="monospace" font-size="12">PS C:\&gt;</text>
  <text x="88" y="66" fill="#E2E8F0" font-family="monospace" font-size="12">Import-Module IntelligenceX</text>

  <text x="24" y="90" fill="#00D9FF" font-family="monospace" font-size="12">PS C:\&gt;</text>
  <text x="88" y="90" fill="#E2E8F0" font-family="monospace" font-size="12">Get-IXToolPack | Format-Table</text>

  <!-- Table header -->
  <text x="24" y="118" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">Name              Version    Tools  Status</text>
  <text x="24" y="134" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">----              -------    -----  ------</text>

  <!-- Table rows -->
  <text x="24" y="152" fill="#E2E8F0" font-family="monospace" font-size="11">ActiveDirectory   2.1.0      12     </text>
  <text x="380" y="152" fill="#10B981" font-family="monospace" font-size="11">Loaded</text>
  <text x="24" y="168" fill="#E2E8F0" font-family="monospace" font-size="11">Exchange          1.8.3       8     </text>
  <text x="380" y="168" fill="#10B981" font-family="monospace" font-size="11">Loaded</text>
  <text x="24" y="184" fill="#E2E8F0" font-family="monospace" font-size="11">DevOps            1.5.0       6     </text>
  <text x="380" y="184" fill="#FEBC2E" font-family="monospace" font-size="11">Available</text>
  <text x="24" y="200" fill="#E2E8F0" font-family="monospace" font-size="11">Email             1.2.1       5     </text>
  <text x="380" y="200" fill="#10B981" font-family="monospace" font-size="11">Loaded</text>

  <!-- PS prompt 2 -->
  <text x="24" y="232" fill="#00D9FF" font-family="monospace" font-size="12">PS C:\&gt;</text>
  <text x="88" y="232" fill="#E2E8F0" font-family="monospace" font-size="12">Invoke-IXChat "List disabled users in the Marketing OU"</text>

  <text x="24" y="260" fill="#8892B0" font-family="monospace" font-size="11">Processing request with agent: ops-agent</text>
  <text x="24" y="278" fill="#8892B0" font-family="monospace" font-size="11">Executing tool: Search-ADUser -Filter {Enabled -eq $false} -SearchBase "OU=Marketing,DC=corp,DC=local"</text>

  <!-- Result -->
  <rect x="24" y="292" width="752" height="120" rx="4" fill="#1E2435"/>
  <text x="40" y="316" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">SamAccountName    DisplayName          LastLogon           Disabled</text>
  <text x="40" y="332" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">--------------    -----------          ---------           --------</text>
  <text x="40" y="350" fill="#E2E8F0" font-family="monospace" font-size="11">t.baker           Tom Baker            2025-12-01          2026-01-15</text>
  <text x="40" y="366" fill="#E2E8F0" font-family="monospace" font-size="11">s.patel           Sarah Patel          2025-11-20          2025-12-30</text>
  <text x="40" y="382" fill="#E2E8F0" font-family="monospace" font-size="11">r.garcia          Rosa Garcia          2026-01-05          2026-02-01</text>
  <text x="40" y="400" fill="#8892B0" font-family="monospace" font-size="10">Found 3 disabled users in OU=Marketing</text>

  <!-- PS prompt 3 -->
  <text x="24" y="434" fill="#00D9FF" font-family="monospace" font-size="12">PS C:\&gt;</text>
  <rect x="88" y="422" width="8" height="16" fill="#00D9FF" opacity="0.6"/>
</svg>