<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#0A0E1A"/>
  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#141824"/>
  <rect y="28" width="800" height="12" fill="#141824"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="6" fill="#28C840"/>
  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" fill="#8892B0" font-family="monospace" font-size="13">Terminal</text>

  <!-- Terminal content -->
  <text x="24" y="68" fill="#00D9FF" font-family="monospace" font-size="12">$</text>
  <text x="38" y="68" fill="#E2E8F0" font-family="monospace" font-size="12">ix setup</text>

  <text x="24" y="96" fill="#00D9FF" font-family="monospace" font-size="13" font-weight="bold">IntelligenceX Setup Wizard</text>
  <text x="24" y="114" fill="#8892B0" font-family="monospace" font-size="11">Configure your IX environment in a few steps.</text>

  <text x="24" y="142" fill="#E2E8F0" font-family="monospace" font-size="12">? Select AI provider:</text>
  <text x="24" y="162" fill="#8892B0" font-family="monospace" font-size="12">  OpenAI</text>
  <text x="24" y="180" fill="#00D9FF" font-family="monospace" font-size="12">&#x25B6; Azure OpenAI</text>
  <text x="24" y="198" fill="#8892B0" font-family="monospace" font-size="12">  Anthropic</text>
  <text x="24" y="216" fill="#8892B0" font-family="monospace" font-size="12">  Ollama (local)</text>

  <text x="24" y="248" fill="#E2E8F0" font-family="monospace" font-size="12">? Azure endpoint:</text>
  <text x="170" y="248" fill="#00D9FF" font-family="monospace" font-size="12">https://myorg.openai.azure.com</text>
  <text x="24" y="270" fill="#E2E8F0" font-family="monospace" font-size="12">? Deployment name:</text>
  <text x="180" y="270" fill="#00D9FF" font-family="monospace" font-size="12">gpt-4o</text>
  <text x="24" y="292" fill="#E2E8F0" font-family="monospace" font-size="12">? API key:</text>
  <text x="104" y="292" fill="#8892B0" font-family="monospace" font-size="12">********************************</text>

  <text x="24" y="324" fill="#10B981" font-family="monospace" font-size="12">&#x2713; AI provider configured</text>

  <text x="24" y="352" fill="#E2E8F0" font-family="monospace" font-size="12">? Enable tool packs: (space to select)</text>
  <text x="24" y="372" fill="#10B981" font-family="monospace" font-size="12">  [x] ActiveDirectory</text>
  <text x="24" y="390" fill="#10B981" font-family="monospace" font-size="12">  [x] Exchange</text>
  <text x="24" y="408" fill="#8892B0" font-family="monospace" font-size="12">  [ ] DevOps</text>
  <text x="24" y="426" fill="#10B981" font-family="monospace" font-size="12">  [x] Email</text>
  <text x="24" y="444" fill="#8892B0" font-family="monospace" font-size="12">  [ ] GitHub</text>

  <text x="24" y="474" fill="#8892B0" font-family="monospace" font-size="11">Press Enter to confirm, Ctrl+C to cancel</text>
</svg>