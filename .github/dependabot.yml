version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "actions/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "github/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "codecov/codecov-action"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "anthropics/claude-code-action"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "dorny/paths-filter"
        update-types:
          - "version-update:semver-major"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "System.DirectoryServices"
        update-types:
          - "version-update:semver-major"
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
