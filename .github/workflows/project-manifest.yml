name: Project Manifest

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "Build/Export-ProjectManifest.ps1"
      - "IntelligenceX/**/*.csproj"
      - "WebsiteArtifacts/project-manifest.json"

jobs:
  verify-manifest:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Manifest
        shell: pwsh
        run: |
          ./Build/Export-ProjectManifest.ps1

      - name: Verify Manifest Is Committed
        shell: pwsh
        run: |
          git diff --exit-code -- WebsiteArtifacts/project-manifest.json

      - name: Upload Manifest Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: project-manifest
          path: WebsiteArtifacts/project-manifest.json
