name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'Website/**'
      - 'Docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  website-deploy:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-deploy.yml@2f2a6d96e9c562040e3e844d6511c0b6a26971fc
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      site_output_path: Website/_site
      post_deploy_pipeline_config: Website/pipeline.cloudflare.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 63583b4091cca3b9b6fcbc9cb71f3bb278c8b4ae
    secrets:
      indexnow_key: ${{ secrets.INDEXNOW_KEY }}
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID_IX }}
