name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'Website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install PowerForge
        run: dotnet tool install --global PowerForge.Web.Cli

      - name: Build website
        working-directory: Website
        run: powerforge-web pipeline --config pipeline.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
