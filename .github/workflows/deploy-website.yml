name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'Website/**'
      - 'Docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Optional repo/org variable: POWERFORGE_REF (branch/tag/SHA) for controlled engine rollouts.
  POWERFORGE_REPOSITORY: EvotecIT/PSPublishModule
  POWERFORGE_REF: ${{ vars.POWERFORGE_REF != '' && vars.POWERFORGE_REF || 'a9b7144f30da9edd6e06e644c3fc05535baec26a' }}

jobs:
  build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout PSPublishModule
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.POWERFORGE_REPOSITORY }}
          ref: ${{ env.POWERFORGE_REF }}
          path: PSPublishModule

      - name: Build PowerForge.Web.Cli
        run: dotnet build PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -c Release

      - name: Build website
        working-directory: Website
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: dotnet ../PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll pipeline --config pipeline.json --mode ci

      - name: Verify website output
        run: |
          test -f Website/_site/.nojekyll
          test -f Website/_site/index.html
          test -f Website/_site/docs/index.html
          test -f Website/_site/404.html
          grep -Eqi "<link[^>]+rel=[^>]*stylesheet" Website/_site/404.html

      - name: Archive Pages artifact
        shell: bash
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "Website/_site" \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  purge-cloudflare:
    needs: deploy
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    permissions:
      contents: read
    steps:
      - name: Resolve Cloudflare settings
        id: cloudflare
        run: |
          token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          zone="${{ secrets.CLOUDFLARE_ZONE_ID_IX }}"
          if [ -z "$token" ] || [ -z "$zone" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare purge/verify skipped: missing required secrets."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout PSPublishModule
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.POWERFORGE_REPOSITORY }}
          ref: ${{ env.POWERFORGE_REF }}
          path: PSPublishModule

      - name: Build PowerForge.Web.Cli
        if: steps.cloudflare.outputs.enabled == 'true'
        run: dotnet build PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -c Release

      - name: Purge Cloudflare cache (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          dotnet PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll \
            cloudflare purge \
            --zone-id "${{ secrets.CLOUDFLARE_ZONE_ID_IX }}" \
            --token-env CLOUDFLARE_API_TOKEN \
            --site-config "Website/site.json"

      - name: Verify Cloudflare cache status (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        run: |
          dotnet PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll \
            cloudflare verify \
            --site-config "Website/site.json" \
            --warmup 1
