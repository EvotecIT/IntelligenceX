name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'Website/**'
      - 'Docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve PowerForgeWeb tool lock
        id: powerforge
        shell: pwsh
        run: |
          $lockPath = 'Website/.powerforge/tool-lock.json'
          $lock = Get-Content -LiteralPath $lockPath -Raw | ConvertFrom-Json
          if ($null -eq $lock) {
            throw "Invalid PowerForge tool lock JSON: $lockPath"
          }

          "repository=$([string]$lock.repository)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$([string]$lock.tag)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset=$([string]$lock.asset)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary_path=$([string]$lock.binaryPath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$([string]$lock.sha256)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download PowerForgeWeb
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_url="https://github.com/${{ steps.powerforge.outputs.repository }}/releases/download/${{ steps.powerforge.outputs.tag }}/${{ steps.powerforge.outputs.asset }}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -o "${RUNNER_TEMP}/powerforgeweb.zip" \
            "${asset_url}"

      - name: Verify PowerForgeWeb checksum
        if: ${{ steps.powerforge.outputs.sha256 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.powerforge.outputs.sha256 }}  ${RUNNER_TEMP}/powerforgeweb.zip" | sha256sum --check --status

      - name: Extract PowerForgeWeb
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./.powerforge-bin
          mkdir -p ./.powerforge-bin/current
          unzip -q "${RUNNER_TEMP}/powerforgeweb.zip" -d ./.powerforge-bin/current
          chmod +x "./.powerforge-bin/current/${{ steps.powerforge.outputs.binary_path }}" || true

      - name: Initialize Playwright cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PLAYWRIGHT_BROWSERS_PATH}"

      - name: Build website
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: ./.powerforge-bin/current/${{ steps.powerforge.outputs.binary_path }} pipeline --config Website/pipeline.json --mode ci

      - name: Verify website output
        run: |
          test -f Website/_site/.nojekyll
          test -f Website/_site/index.html
          test -f Website/_site/docs/index.html
          test -f Website/_site/404.html
          grep -Eqi "<link[^>]+rel=[^>]*stylesheet" Website/_site/404.html

      - name: Archive Pages artifact
        shell: bash
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "Website/_site" \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Prune stale github-pages artifacts
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const keepNewest = 3;
            const minAgeHours = 6;
            const now = Date.now();
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, name: "github-pages", per_page: 100 },
              (response) => response?.data?.artifacts ?? []
            );

            artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let deleted = 0;
            let skippedRecent = 0;
            let failures = 0;

            for (const artifact of artifacts.slice(keepNewest)) {
              const created = new Date(artifact.created_at).getTime();
              const ageHours = Number.isFinite(created) ? (now - created) / (1000 * 60 * 60) : minAgeHours + 1;
              if (ageHours < minAgeHours) {
                skippedRecent++;
                continue;
              }

              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                deleted++;
                core.info(`Deleted artifact id=${artifact.id} created_at=${artifact.created_at}`);
              } catch (error) {
                failures++;
                core.warning(`Failed to delete artifact id=${artifact.id}: ${error.message}`);
              }
            }

            core.info(
              `Artifact prune summary: found=${artifacts.length}, kept=${Math.min(artifacts.length, keepNewest)}, deleted=${deleted}, skipped_recent=${skippedRecent}, failures=${failures}`
            );

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Cleanup Playwright cache
        if: always()
        shell: bash
        run: |
          if [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ] && [ -d "${PLAYWRIGHT_BROWSERS_PATH}" ]; then
            rm -rf "${PLAYWRIGHT_BROWSERS_PATH}"
          fi

  deploy:
    needs: build
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  purge-cloudflare:
    needs: deploy
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    permissions:
      contents: read
    steps:
      - name: Resolve Cloudflare settings
        id: cloudflare
        run: |
          token="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          zone="${{ secrets.CLOUDFLARE_ZONE_ID_IX }}"
          if [ -z "$token" ] || [ -z "$zone" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare purge/verify skipped: missing required secrets."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve PowerForgeWeb tool lock
        if: steps.cloudflare.outputs.enabled == 'true'
        id: powerforge
        shell: pwsh
        run: |
          $lockPath = 'Website/.powerforge/tool-lock.json'
          $lock = Get-Content -LiteralPath $lockPath -Raw | ConvertFrom-Json
          if ($null -eq $lock) {
            throw "Invalid PowerForge tool lock JSON: $lockPath"
          }

          "repository=$([string]$lock.repository)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$([string]$lock.tag)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset=$([string]$lock.asset)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary_path=$([string]$lock.binaryPath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$([string]$lock.sha256)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download PowerForgeWeb
        if: steps.cloudflare.outputs.enabled == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_url="https://github.com/${{ steps.powerforge.outputs.repository }}/releases/download/${{ steps.powerforge.outputs.tag }}/${{ steps.powerforge.outputs.asset }}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -o "${RUNNER_TEMP}/powerforgeweb.zip" \
            "${asset_url}"

      - name: Verify PowerForgeWeb checksum
        if: ${{ steps.cloudflare.outputs.enabled == 'true' && steps.powerforge.outputs.sha256 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.powerforge.outputs.sha256 }}  ${RUNNER_TEMP}/powerforgeweb.zip" | sha256sum --check --status

      - name: Extract PowerForgeWeb
        if: steps.cloudflare.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./.powerforge-bin
          mkdir -p ./.powerforge-bin/current
          unzip -q "${RUNNER_TEMP}/powerforgeweb.zip" -d ./.powerforge-bin/current
          chmod +x "./.powerforge-bin/current/${{ steps.powerforge.outputs.binary_path }}" || true

      - name: Purge Cloudflare cache (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ./.powerforge-bin/current/${{ steps.powerforge.outputs.binary_path }} \
            cloudflare purge \
            --zone-id "${{ secrets.CLOUDFLARE_ZONE_ID_IX }}" \
            --token-env CLOUDFLARE_API_TOKEN \
            --site-config "Website/site.json"

      - name: Verify Cloudflare cache status (key routes)
        if: steps.cloudflare.outputs.enabled == 'true'
        run: |
          ./.powerforge-bin/current/${{ steps.powerforge.outputs.binary_path }} \
            cloudflare verify \
            --site-config "Website/site.json" \
            --warmup 1 \
            --allow-status "HIT,REVALIDATED,EXPIRED,STALE,DYNAMIC"
