name: Test .NET Libraries (Hosted)

on:
    # GitHub-hosted runners cost money for private repos.
    # Keep this workflow manual so maintainers can opt-in when needed.
    workflow_dispatch:

env:
    DOTNET_VERSION: |
        8.x
        10.0.x
    BUILD_CONFIGURATION: 'Release'

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                os:
                    - windows-latest
                    - ubuntu-latest
                    - macos-latest
        name: '${{ matrix.os }}'
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup .NET
              uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: always()
              with:
                  name: test-results-${{ matrix.os }}
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: ${{ always() && hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  name: coverage-reports-${{ matrix.os }}
                  path: '**/coverage.cobertura.xml'
