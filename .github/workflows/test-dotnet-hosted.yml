name: Test .NET Libraries (Hosted)

on:
    # GitHub-hosted runners cost money for private repos.
    # Keep this workflow manual so maintainers can opt-in when needed.
    workflow_dispatch:

permissions:
    contents: read

env:
    DOTNET_VERSION: |
        8.x
        10.0.x
    BUILD_CONFIGURATION: 'Release'
    CI_SOLUTION: 'IntelligenceX.CI.slnf'

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                os:
                    - windows-latest
                    - ubuntu-latest
                    - macos-latest
        name: '${{ matrix.os }}'
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup .NET
              uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore ${{ env.CI_SOLUTION }}

            - name: Build solution
              run: dotnet build ${{ env.CI_SOLUTION }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test ${{ env.CI_SOLUTION }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Enforce OfficeIMO markdown package-mode gate
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: pwsh -ExecutionPolicy Bypass -File ./.github/scripts/run-officeimo-markdown-package-gate.ps1
              timeout-minutes: 25

            - name: Enforce write-tool schema helper contract
              if: matrix.os == 'ubuntu-latest'
              shell: bash
              run: bash .github/scripts/run-write-tool-gate.sh

            - name: Enforce chat scenario quality gate
              if: matrix.os == 'ubuntu-latest'
              shell: bash
              run: bash .github/scripts/run-chat-scenario-quality-gate.sh

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              continue-on-error: true
              with:
                  name: test-results-${{ matrix.os }}
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ always() && hashFiles('**/coverage.cobertura.xml') != '' }}
              continue-on-error: true
              with:
                  name: coverage-reports-${{ matrix.os }}
                  path: '**/coverage.cobertura.xml'
