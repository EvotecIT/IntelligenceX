name: Analysis Catalog Guardrail

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Analysis/Catalog/**'
      - 'Analysis/Packs/**'
      - '.github/workflows/analysis-catalog-guardrail.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Analysis Catalog
    # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
    # Set repository variable IX_FORCE_GITHUB_HOSTED=true to bypass self-hosted runners temporarily.
    # When public, use GitHub-hosted runners by default.
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.0.x

      - name: Validate catalog structure and pack integrity
        run: dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- analyze validate-catalog --workspace .

      - name: Resolve all pack rules
        shell: bash
        run: |
          set -euo pipefail
          packs="$(dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- analyze list-packs --workspace . --ids | tr '\n' ',' | sed 's/,$//')"
          if [ -z "${packs}" ]; then
            echo "No analysis packs found."
            exit 1
          fi
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj --framework net8.0 -- analyze list-rules --workspace . --format json --packs "${packs}" > /dev/null
