name: IntelligenceX Release Notes

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      from:
        description: 'Start tag for notes (optional)'
        required: false
        default: ''
      to:
        description: 'End tag/ref for notes (default: current ref)'
        required: false
        default: ''
      version:
        description: 'Version label for changelog section (default: current ref)'
        required: false
        default: ''
      create_pr:
        description: 'Create a PR instead of pushing directly'
        required: false
        default: 'false'
      skip_review:
        description: 'Mark PR to skip IntelligenceX review'
        required: false
        default: 'true'
      pr_branch:
        description: 'Branch name for PR (optional)'
        required: false
        default: ''
      pr_title:
        description: 'PR title (optional)'
        required: false
        default: ''
      pr_body:
        description: 'PR body (optional)'
        required: false
        default: ''
      pr_labels:
        description: 'Comma-separated PR labels (optional)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  release-notes:
    runs-on: [self-hosted, ubuntu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate release notes
        env:
          INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_MODEL: gpt-5.2-codex
          OPENAI_TRANSPORT: native
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -- release notes \
            --update-changelog \
            --from "${{ inputs.from }}" \
            --to "${{ inputs.to }}" \
            --version "${{ inputs.version }}" \
            --commit \
            --create-pr "${{ inputs.create_pr }}" \
            --skip-review "${{ inputs.skip_review }}" \
            --pr-branch "${{ inputs.pr_branch }}" \
            --pr-title "${{ inputs.pr_title }}" \
            --pr-body "${{ inputs.pr_body }}" \
            --pr-labels "${{ inputs.pr_labels }}"
