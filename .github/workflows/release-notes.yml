name: IntelligenceX Release Notes

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      from:
        description: 'Start tag for notes (optional)'
        required: false
        default: ''
      to:
        description: 'End tag/ref for notes (default: current ref)'
        required: false
        default: ''
      version:
        description: 'Version label for changelog section (default: current ref)'
        required: false
        default: ''
      repo_slug:
        description: 'GitHub repo slug for PR creation (owner/name)'
        required: false
        default: ''
      create_pr:
        description: 'Create a PR instead of pushing directly'
        required: false
        default: 'false'
      skip_review:
        description: 'Mark PR to skip IntelligenceX review'
        required: false
        default: 'true'
      pr_branch:
        description: 'Branch name for PR (optional)'
        required: false
        default: ''
      pr_title:
        description: 'PR title (optional)'
        required: false
        default: ''
      pr_body:
        description: 'PR body (optional)'
        required: false
        default: ''
      pr_labels:
        description: 'Comma-separated PR labels (optional)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  release-notes:
    runs-on: [self-hosted, ubuntu]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.to || github.ref || github.event.repository.default_branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Generate release notes
        env:
          INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTELLIGENCEX_RELEASE_FROM: ${{ inputs.from }}
          INTELLIGENCEX_RELEASE_TO: ${{ inputs.to }}
          INTELLIGENCEX_RELEASE_VERSION: ${{ inputs.version }}
          INTELLIGENCEX_RELEASE_CREATE_PR: ${{ inputs.create_pr }}
          INTELLIGENCEX_RELEASE_COMMIT: ${{ inputs.create_pr != 'true' }}
          INTELLIGENCEX_RELEASE_SKIP_REVIEW: ${{ inputs.skip_review }}
          INTELLIGENCEX_RELEASE_PR_BRANCH: ${{ inputs.pr_branch }}
          INTELLIGENCEX_RELEASE_PR_TITLE: ${{ inputs.pr_title }}
          INTELLIGENCEX_RELEASE_PR_BODY: ${{ inputs.pr_body }}
          INTELLIGENCEX_RELEASE_PR_LABELS: ${{ inputs.pr_labels }}
          INTELLIGENCEX_RELEASE_REPO_SLUG: ${{ inputs.repo_slug || github.repository }}
          OPENAI_MODEL: gpt-5.3-codex
          OPENAI_TRANSPORT: native
        shell: bash
        run: bash -euo pipefail scripts/release-notes.sh
