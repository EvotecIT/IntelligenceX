name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@c892bb2ce884b30e62898118f365d041464d551f
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_ref: c892bb2ce884b30e62898118f365d041464d551f
      powerforge_web_tag: PowerForgeWeb-v1.0.0-preview-20260328151156
