name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@c86985967f2cac1cfa427c7c5778f768f5e389d2
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: binary
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_tool_lock_path: Website/.powerforge/tool-lock.json
