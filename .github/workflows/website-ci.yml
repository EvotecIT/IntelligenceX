name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@d24c3a970a4c7ca1ec012ebe5461ff8b346a9123
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 1fbe30fb0e12726b0e195a1072b37d875d7edf12
