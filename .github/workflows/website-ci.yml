name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@91a34dd50854f44d20f896ac6f4b449293fd851a
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_lock_path: Website/.powerforge/engine-lock.json
      report_artifact_name: powerforge-website-reports
