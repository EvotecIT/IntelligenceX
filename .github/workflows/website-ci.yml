name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned until IntelligenceX adopts an engine lock file.
  POWERFORGE_REPOSITORY: EvotecIT/PSPublishModule
  POWERFORGE_REF: 4751f06a2a52d926fc222a709ea6f0fff3d022c7

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@codex/testimox-doctor-seo-fix
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 4751f06a2a52d926fc222a709ea6f0fff3d022c7
      report_artifact_name: powerforge-website-reports
    secrets: inherit
