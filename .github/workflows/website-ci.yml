name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@6665d9631a76bd33ba83e16c23adaa68d3b5d701
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 2b3adb4ffe114132d85520ca2dc8c7b9b3fad642
