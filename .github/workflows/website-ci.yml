name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@b190b8f0fcea9177bc3c8a06af843ff44801e9d1
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: b190b8f0fcea9177bc3c8a06af843ff44801e9d1
