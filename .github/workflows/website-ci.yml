name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@2ea966a14feaf6c4cf65f2bf654005b796193d28
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: source
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 2ea966a14feaf6c4cf65f2bf654005b796193d28
