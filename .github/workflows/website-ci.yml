name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-build:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@7a64f111defc840b870ecb866b84f8da37bf768f
    with:
      website_root: Website
      pipeline_config: Website/pipeline.json
      engine_mode: binary
      runner_labels_json: ${{ (github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 7a64f111defc840b870ecb866b84f8da37bf768f
      powerforge_tool_lock_path: Website/.powerforge/tool-lock.json
