name: Website Build (PR)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Optional repo/org variable: POWERFORGE_REF (branch/tag/SHA) for controlled engine rollouts.
  POWERFORGE_REPOSITORY: EvotecIT/PSPublishModule
  POWERFORGE_REF: ${{ vars.POWERFORGE_REF != '' && vars.POWERFORGE_REF || '42d61a88f5196f570b9afbc56e068eaa583ac9f4' }}

jobs:
  website-build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout PSPublishModule
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.POWERFORGE_REPOSITORY }}
          ref: ${{ env.POWERFORGE_REF }}
          path: PSPublishModule

      - name: Build PowerForge.Web.Cli
        run: dotnet build PSPublishModule/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -c Release

      - name: Initialize Playwright cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PLAYWRIGHT_BROWSERS_PATH}"

      - name: Build website
        working-directory: Website
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: dotnet ../PSPublishModule/PowerForge.Web.Cli/bin/Release/net10.0/PowerForge.Web.Cli.dll pipeline --config pipeline.json --mode ci

      - name: Verify website output
        run: |
          test -f Website/_site/.nojekyll
          test -f Website/_site/index.html
          test -f Website/_site/docs/index.html
          test -f Website/_site/404.html
          grep -Eqi "<link[^>]+rel=[^>]*stylesheet" Website/_site/404.html

      - name: Cleanup Playwright cache
        if: always()
        shell: bash
        run: |
          if [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ] && [ -d "${PLAYWRIGHT_BROWSERS_PATH}" ]; then
            rm -rf "${PLAYWRIGHT_BROWSERS_PATH}"
          fi
