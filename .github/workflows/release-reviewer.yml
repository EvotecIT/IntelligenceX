name: Release IntelligenceX Reviewer (Public)

on:
  workflow_dispatch:

concurrency:
  group: release-reviewer-${{ github.repository }}-reviewer-latest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
    permissions:
      # Same-repo release publishing uses github.token, which needs contents:write to create/update releases.
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Checkout PSPublishModule
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: EvotecIT/PSPublishModule
          ref: v3.0.32
          path: .powerforge/PSPublishModule

      - name: Publish reviewer
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ''
          POWERFORGE_ROOT: ${{ github.workspace }}/.powerforge/PSPublishModule
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:INTELLIGENCEX_REVIEWER_TOKEN = $env:GITHUB_TOKEN

          $arguments = @(
            '-NoProfile',
            '-File',
            './Build/Build-Project.ps1',
            '-ConfigPath',
            './Build/release.reviewer.json',
            '-ToolsOnly',
            '-Targets',
            'IntelligenceX.Reviewer',
            '-PublishToolGitHub',
            '-SkipWorkspaceBuild'
          )

          & pwsh @arguments
