name: Release IntelligenceX Reviewer (Public)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag in EvotecIT/github-actions (blank = timestamp)'
        required: false
        default: ''
      release_title:
        description: 'Release title (optional)'
        required: false
        default: ''
      release_notes:
        description: 'Release notes body (optional)'
        required: false
        default: ''
      release_repo:
        description: 'Release repo slug (owner/name)'
        required: false
        default: 'EvotecIT/github-actions'
      rids:
        description: 'Comma-separated runtime IDs (optional)'
        required: false
        default: ''
      framework:
        description: 'Target framework (optional)'
        required: false
        default: ''
      configuration:
        description: 'Build configuration (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: [self-hosted, ubuntu]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish reviewer
        env:
          INTELLIGENCEX_RELEASE_TOKEN: ${{ secrets.INTELLIGENCEX_RELEASE_TOKEN }}
          INTELLIGENCEX_REVIEWER_TAG: ${{ inputs.release_tag }}
          INTELLIGENCEX_REVIEWER_TITLE: ${{ inputs.release_title }}
          INTELLIGENCEX_REVIEWER_NOTES: ${{ inputs.release_notes }}
          INTELLIGENCEX_REVIEWER_REPO_SLUG: ${{ inputs.release_repo }}
          INTELLIGENCEX_REVIEWER_RIDS: ${{ inputs.rids }}
          INTELLIGENCEX_REVIEWER_FRAMEWORK: ${{ inputs.framework }}
          INTELLIGENCEX_REVIEWER_CONFIGURATION: ${{ inputs.configuration }}
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -- release reviewer
