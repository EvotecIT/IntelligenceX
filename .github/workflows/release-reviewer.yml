name: Release IntelligenceX Reviewer (Public)

on:
  workflow_dispatch:
    inputs:
      rids:
        description: 'Comma-separated runtime IDs (optional)'
        required: false
        default: ''
      framework:
        description: 'Target framework (optional)'
        required: false
        default: ''
      configuration:
        description: 'Build configuration (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_FORCE_GITHUB_HOSTED != 'true') && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
    permissions:
      # Same-repo release publishing uses github.token, which needs contents:write to create/update releases.
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Checkout PSPublishModule
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: EvotecIT/PSPublishModule
          ref: codex/github-release-replace-assets-20260621
          path: .powerforge/PSPublishModule

      - name: Publish reviewer
        env:
          INTELLIGENCEX_RELEASE_TOKEN: ${{ secrets.INTELLIGENCEX_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ''
          INTELLIGENCEX_REVIEWER_RIDS: ${{ inputs.rids }}
          INTELLIGENCEX_REVIEWER_FRAMEWORK: ${{ inputs.framework }}
          INTELLIGENCEX_REVIEWER_CONFIGURATION: ${{ inputs.configuration }}
          POWERFORGE_ROOT: ${{ github.workspace }}/.powerforge/PSPublishModule
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:INTELLIGENCEX_REVIEWER_TOKEN = if ([string]::IsNullOrWhiteSpace($env:INTELLIGENCEX_RELEASE_TOKEN)) {
            $env:GITHUB_TOKEN
          } else {
            $env:INTELLIGENCEX_RELEASE_TOKEN
          }

          $arguments = @(
            '-NoProfile',
            '-File',
            './Build/Build-Project.ps1',
            '-ConfigPath',
            './Build/release.reviewer.json',
            '-ToolsOnly',
            '-Targets',
            'IntelligenceX.Reviewer',
            '-PublishToolGitHub',
            '-SkipWorkspaceBuild'
          )

          if (-not [string]::IsNullOrWhiteSpace($env:INTELLIGENCEX_REVIEWER_RIDS)) {
            $arguments += @('-Runtimes', $env:INTELLIGENCEX_REVIEWER_RIDS)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:INTELLIGENCEX_REVIEWER_FRAMEWORK)) {
            $arguments += @('-Frameworks', $env:INTELLIGENCEX_REVIEWER_FRAMEWORK)
          }
          if (-not [string]::IsNullOrWhiteSpace($env:INTELLIGENCEX_REVIEWER_CONFIGURATION)) {
            $arguments += @('-Configuration', $env:INTELLIGENCEX_REVIEWER_CONFIGURATION)
          }
          & pwsh @arguments
