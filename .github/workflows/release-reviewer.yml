name: Release IntelligenceX Reviewer (Public)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag in EvotecIT/github-actions (blank = timestamp)'
        required: false
        default: ''
      release_title:
        description: 'Release title (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish reviewer
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish IntelligenceX.Reviewer/IntelligenceX.Reviewer.csproj -c Release -r linux-x64 --self-contained false -o out/linux-x64
          dotnet publish IntelligenceX.Reviewer/IntelligenceX.Reviewer.csproj -c Release -r win-x64 --self-contained false -o out/win-x64
          dotnet publish IntelligenceX.Reviewer/IntelligenceX.Reviewer.csproj -c Release -r osx-x64 --self-contained false -o out/osx-x64
          (cd out && zip -r ../IntelligenceX.Reviewer-linux-x64.zip linux-x64)
          (cd out && zip -r ../IntelligenceX.Reviewer-win-x64.zip win-x64)
          (cd out && zip -r ../IntelligenceX.Reviewer-osx-x64.zip osx-x64)

      - name: Publish release assets to EvotecIT/github-actions
        env:
          GH_TOKEN: ${{ secrets.INTELLIGENCEX_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret INTELLIGENCEX_RELEASE_TOKEN"
            exit 1
          fi
          tag="${{ inputs.release_tag }}"
          if [ -z "$tag" ]; then
            tag="reviewer-$(date +%Y%m%d%H%M%S)"
          fi
          title="${{ inputs.release_title }}"
          if [ -z "$title" ]; then
            title="IntelligenceX Reviewer $tag"
          fi
          if ! gh release view "$tag" --repo EvotecIT/github-actions >/dev/null 2>&1; then
            gh release create "$tag" --repo EvotecIT/github-actions --title "$title" --notes "Automated build from EvotecIT/IntelligenceX."
          fi
          gh release upload "$tag" --repo EvotecIT/github-actions IntelligenceX.Reviewer-*.zip --clobber
