name: Self-Hosted Runner Housekeeping

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_run:
    workflows:
      - Test .NET Libraries
      - IntelligenceX Review
      - Claude Code Review
      - Analysis Catalog Guardrail
    types:
      - completed
  workflow_dispatch:
    {}

permissions:
  contents: read

concurrency:
  group: self-hosted-runner-housekeeping-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cleanup-linux-runner:
    if: ${{ github.event.repository.private }}
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-github-runner-housekeeping.yml@79c9e7ddeb524a4a2b921a3ebd39d4c2ab9dc0e9
    with:
      config-path: ./.powerforge/runner-housekeeping.json
      apply: true
      powerforge-ref: 79c9e7ddeb524a4a2b921a3ebd39d4c2ab9dc0e9
      runner-labels: '["self-hosted","ubuntu"]'
      report-artifact-name: runner-housekeeping-reports
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
