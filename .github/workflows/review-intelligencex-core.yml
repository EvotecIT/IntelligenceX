name: IntelligenceX Review
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON array of runner labels'
        required: false
        default: '["ubuntu-latest"]'
        type: string
      repo:
        description: 'Repository (owner/name) for workflow_dispatch or external calls'
        required: false
        default: ''
        type: string
      pr_number:
        description: 'Pull request number for workflow_dispatch or external calls'
        required: false
        default: ''
        type: string
      reviewer_source:
        description: 'Reviewer source: source or release'
        required: false
        default: 'source'
        type: string
      reviewer_release_repo:
        description: 'Release repo (owner/name) containing reviewer assets'
        required: false
        default: 'EvotecIT/IntelligenceX'
        type: string
      reviewer_release_tag:
        description: 'Release tag (or latest)'
        required: false
        default: 'latest'
        type: string
      reviewer_release_asset:
        description: 'Asset name (optional, defaults by OS)'
        required: false
        default: ''
        type: string
      reviewer_release_url:
        description: 'Direct asset URL (optional, overrides repo/tag/asset)'
        required: false
        default: ''
        type: string
      provider:
        description: 'Review provider: openai, claude, or copilot'
        required: false
        default: 'openai'
        type: string
      agent_profile:
        description: 'Named review agent profile from reviewer.json'
        required: false
        default: ''
        type: string
      model:
        description: 'Model id (provider-specific)'
        required: false
        default: 'gpt-5.5'
        type: string
      openai_model:
        description: 'OpenAI model id (overrides model when provider=openai)'
        required: false
        default: ''
        type: string
      copilot_model:
        description: 'Copilot model id (overrides model when provider=copilot)'
        required: false
        default: ''
        type: string
      copilot_launcher:
        description: 'Copilot launcher: binary, gh, or auto'
        required: false
        default: ''
        type: string
      openai_transport:
        description: 'OpenAI transport: native or appserver'
        required: false
        default: 'native'
        type: string
      openai_account_id:
        description: 'Override OpenAI account id for this run'
        required: false
        default: ''
        type: string
      openai_account_ids:
        description: 'Override ordered OpenAI account ids (CSV) for this run'
        required: false
        default: ''
        type: string
      openai_account_rotation:
        description: 'Override OpenAI account rotation (first-available|round-robin|sticky) for this run'
        required: false
        default: ''
        type: string
      openai_account_failover:
        description: 'Override OpenAI account failover (true|false) for this run'
        required: false
        default: ''
        type: string
      usage_budget_guard:
        description: 'Override usage budget guard (true|false) for this run'
        required: false
        default: ''
        type: string
      usage_budget_allow_credits:
        description: 'Override credits budget allowance (true|false) for this run'
        required: false
        default: ''
        type: string
      usage_budget_allow_weekly_limit:
        description: 'Override weekly-limit budget allowance (true|false) for this run'
        required: false
        default: ''
        type: string
      profile:
        description: 'Prompt profile: picky, balanced, highlevel, security, performance, tests'
        required: false
        default: 'balanced'
        type: string
      style:
        description: 'Review style preset: direct, friendly, funny, colorful, formal'
        required: false
        default: ''
        type: string
      output_style:
        description: 'Output style preset (e.g., claude)'
        required: false
        default: ''
        type: string
      strictness:
        description: 'Strictness label passed to prompt'
        required: false
        default: ''
        type: string
      tone:
        description: 'Tone label passed to prompt'
        required: false
        default: ''
        type: string
      focus:
        description: 'Comma-separated focus areas'
        required: false
        default: ''
        type: string
      auto_approve_enabled:
        description: 'Enable guarded auto-approval readiness/approval'
        required: false
        default: ''
        type: string
      auto_approve_dry_run:
        description: 'Audit auto-approval decisions without submitting approvals'
        required: false
        default: ''
        type: string
      auto_approve_required_labels:
        description: 'Comma-separated labels required before auto-approval'
        required: false
        default: ''
        type: string
      auto_approve_allowed_authors:
        description: 'Comma-separated PR author logins eligible for auto-approval'
        required: false
        default: ''
        type: string
      auto_approve_ignored_check_names:
        description: 'Comma-separated check names ignored by auto-approval'
        required: false
        default: ''
        type: string
      length:
        description: 'Review length: short, medium, long'
        required: false
        default: 'long'
        type: string
      mode:
        description: 'Review mode (summary, hybrid, inline, etc.)'
        required: false
        default: 'hybrid'
        type: string
      persona:
        description: 'Persona text'
        required: false
        default: ''
        type: string
      notes:
        description: 'Additional prompt notes'
        required: false
        default: ''
        type: string
      ci_context_enabled:
        description: 'Override reviewer CI/check awareness (true|false) for this run'
        required: false
        default: ''
        type: string
      ci_context_include_check_summary:
        description: 'Override CI context check-summary inclusion (true|false) for this run'
        required: false
        default: ''
        type: string
      ci_context_include_failed_runs:
        description: 'Override failed-run metadata inclusion (true|false) for this run'
        required: false
        default: ''
        type: string
      ci_context_include_failure_snippets:
        description: 'Override CI failure snippet mode (off, auto, always) for this run'
        required: false
        default: ''
        type: string
      ci_context_max_failed_runs:
        description: 'Override max failed workflow runs included in reviewer context'
        required: false
        default: ''
        type: string
      ci_context_max_snippet_chars_per_run:
        description: 'Override max CI failure snippet chars per failed run'
        required: false
        default: ''
        type: string
      ci_context_classify_infra_failures:
        description: 'Override infra-failure classification for reviewer CI context (true|false)'
        required: false
        default: ''
        type: string
      reviewed_changes:
        description: 'Override Reviewed Changes table rendering (true|false)'
        required: false
        default: ''
        type: string
      history_enabled:
        description: 'Override reviewer history awareness (true|false) for this run'
        required: false
        default: ''
        type: string
      history_include_ix_summary_history:
        description: 'Override inclusion of prior IntelligenceX summary rounds (true|false)'
        required: false
        default: ''
        type: string
      history_include_review_threads:
        description: 'Override inclusion of review thread history (true|false)'
        required: false
        default: ''
        type: string
      history_include_external_bot_summaries:
        description: 'Override supporting context from configured external bot summaries (true|false)'
        required: false
        default: ''
        type: string
      history_external_bot_logins:
        description: 'Override external bot logins included as supporting history context (CSV)'
        required: false
        default: ''
        type: string
      history_artifacts:
        description: 'Override reviewer history artifact capture (true|false)'
        required: false
        default: ''
        type: string
      history_max_rounds:
        description: 'Override max prior review rounds included in history context'
        required: false
        default: ''
        type: string
      history_max_items:
        description: 'Override max findings/comments included per history section'
        required: false
        default: ''
        type: string
      swarm_enabled:
        description: 'Override reviewer swarm mode (true|false) for this run'
        required: false
        default: ''
        type: string
      swarm_shadow_mode:
        description: 'Override reviewer swarm shadow mode (true|false) for this run'
        required: false
        default: ''
        type: string
      swarm_reviewers:
        description: 'Override reviewer swarm roles (CSV) for this run'
        required: false
        default: ''
        type: string
      swarm_max_parallel:
        description: 'Override reviewer swarm max parallel reviewers'
        required: false
        default: ''
        type: string
      swarm_publish_subreviews:
        description: 'Override sub-review publishing (true|false); recommended false'
        required: false
        default: ''
        type: string
      swarm_aggregator_model:
        description: 'Override reviewer swarm aggregator model'
        required: false
        default: ''
        type: string
      swarm_fail_open_on_partial:
        description: 'Override swarm partial-failure fail-open behavior (true|false)'
        required: false
        default: ''
        type: string
      swarm_metrics:
        description: 'Override swarm metrics/artifact capture (true|false)'
        required: false
        default: ''
        type: string
      comment_mode:
        description: 'sticky or fresh'
        required: false
        default: 'sticky'
        type: string
      progress_updates:
        description: 'Enable progress updates'
        required: false
        default: true
        type: boolean
      progress_update_seconds:
        description: 'Progress update interval (seconds)'
        required: false
        default: 30
        type: number
      progress_preview_chars:
        description: 'Max chars to show in preliminary analysis during progress'
        required: false
        default: 4000
        type: number
      diagnostics:
        description: 'Enable reviewer diagnostics'
        required: false
        default: false
        type: boolean
      preflight:
        description: 'Run health check before review'
        required: false
        default: false
        type: boolean
      preflight_timeout_seconds:
        description: 'Preflight timeout in seconds'
        required: false
        default: 15
        type: number
      max_files:
        description: 'Max files to review'
        required: false
        default: ''
        type: string
      max_patch_chars:
        description: 'Max patch chars per file'
        required: false
        default: ''
        type: string
      max_inline_comments:
        description: 'Max inline comments'
        required: false
        default: ''
        type: string
      severity_threshold:
        description: 'Only include issues >= severity (low/medium/high/critical)'
        required: false
        default: ''
        type: string
      wait_seconds:
        description: 'Max wait for completion'
        required: false
        default: 180
        type: number
      idle_seconds:
        description: 'Idle timeout for streaming'
        required: false
        default: 5
        type: number
      skip_draft:
        description: 'Skip draft PRs'
        required: false
        default: true
        type: boolean
      skip_titles:
        description: 'Comma-separated title substrings to skip'
        required: false
        default: '[WIP],[skip-review]'
        type: string
      skip_labels:
        description: 'Comma-separated labels to skip'
        required: false
        default: ''
        type: string
      skip_authors:
        description: 'Comma-separated PR author logins to skip before provider auth'
        required: false
        default: ''
        type: string
      force_review_labels:
        description: 'Comma-separated labels that bypass author skip filters'
        required: false
        default: ''
        type: string
      skip_paths:
        description: 'Comma-separated glob patterns; if all files match, skip'
        required: false
        default: ''
        type: string
      redact_pii:
        description: 'Redact PII in prompt'
        required: false
        default: false
        type: boolean
      redaction_patterns:
        description: 'Comma-separated regex patterns to redact'
        required: false
        default: ''
        type: string
      redaction_replacement:
        description: 'Replacement string for redaction'
        required: false
        default: '[REDACTED]'
        type: string
      cleanup_enabled:
        description: 'Enable cleanup for PR/issue metadata'
        required: false
        default: false
        type: boolean
      cleanup_mode:
        description: 'Cleanup mode: comment, edit, hybrid'
        required: false
        default: 'comment'
        type: string
      cleanup_scope:
        description: 'Cleanup scope: pr, issue, both'
        required: false
        default: 'pr'
        type: string
      cleanup_require_label:
        description: 'Require label to trigger cleanup (optional)'
        required: false
        default: ''
        type: string
      cleanup_min_confidence:
        description: 'Minimum confidence for auto-edit (0-1)'
        required: false
        default: 0.85
        type: number
      cleanup_allowed_edits:
        description: 'Comma-separated allowed edits'
        required: false
        default: 'formatting,grammar,title,sections'
        type: string
      cleanup_template:
        description: 'Inline cleanup template'
        required: false
        default: ''
        type: string
      cleanup_template_path:
        description: 'Path to cleanup template'
        required: false
        default: ''
        type: string
      cleanup_post_edit_comment:
        description: 'Post comment after auto-edit'
        required: false
        default: true
        type: boolean
      include_issue_comments:
        description: 'Include PR issue comments in prompt'
        required: false
        default: false
        type: boolean
      include_review_comments:
        description: 'Include PR review comments in prompt'
        required: false
        default: false
        type: boolean
      max_comment_chars:
        description: 'Max chars per included comment'
        required: false
        default: 4000
        type: number
      max_comments:
        description: 'Max comments to include'
        required: false
        default: 20
        type: number
      include_related_prs:
        description: 'Include related PRs in prompt'
        required: false
        default: false
        type: boolean
      related_prs_query:
        description: 'GitHub search query for related PRs (optional)'
        required: false
        default: ''
        type: string
      max_related_prs:
        description: 'Max related PRs to include'
        required: false
        default: 5
        type: number
      prompt_template_path:
        description: 'Path to custom prompt template'
        required: false
        default: ''
        type: string
      summary_template_path:
        description: 'Path to custom summary template'
        required: false
        default: ''
        type: string
      review_config_path:
        description: 'Path to reviewer.json (overrides default .intelligencex/reviewer.json)'
        required: false
        default: ''
        type: string
      codex_path:
        description: 'Codex app-server executable path'
        required: false
        default: ''
        type: string
      codex_args:
        description: 'Codex app-server arguments'
        required: false
        default: ''
        type: string
      codex_cwd:
        description: 'Codex app-server working directory'
        required: false
        default: ''
        type: string
      copilot_cli_path:
        description: 'Copilot CLI path'
        required: false
        default: ''
        type: string
      copilot_cli_url:
        description: 'Copilot CLI URL (host:port)'
        required: false
        default: ''
        type: string
      copilot_cli_workdir:
        description: 'Copilot CLI working directory'
        required: false
        default: ''
        type: string
      copilot_auto_install:
        description: 'Allow auto-install of Copilot CLI'
        required: false
        default: false
        type: boolean
      copilot_auto_install_method:
        description: 'Auto-install method (Auto/Winget/Brew/Npm/Script)'
        required: false
        default: 'Auto'
        type: string
      copilot_auto_install_prerelease:
        description: 'Auto-install prerelease Copilot CLI'
        required: false
        default: false
        type: boolean
    secrets:
      INTELLIGENCEX_AUTH_B64: { required: false }
      ANTHROPIC_API_KEY: { required: false }
      COPILOT_GITHUB_TOKEN: { required: false }
      INTELLIGENCEX_GITHUB_APP_ID: { required: false }
      INTELLIGENCEX_GITHUB_APP_PRIVATE_KEY: { required: false }
jobs:
  review:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    env:
      INTELLIGENCEX_APP_ID: ${{ secrets.INTELLIGENCEX_GITHUB_APP_ID }}
      INTELLIGENCEX_APP_KEY: ${{ secrets.INTELLIGENCEX_GITHUB_APP_PRIVATE_KEY }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INPUT_PROVIDER: ${{ inputs.provider }}
      INPUT_AGENT_PROFILE: ${{ inputs.agent_profile }}
      INPUT_MODEL: ${{ inputs.model }}
      INPUT_OPENAI_MODEL: ${{ inputs.openai_model }}
      INPUT_COPILOT_MODEL: ${{ inputs.copilot_model }}
      INPUT_COPILOT_LAUNCHER: ${{ inputs.copilot_launcher }}
      INPUT_OPENAI_TRANSPORT: ${{ inputs.openai_transport }}
      INPUT_OPENAI_ACCOUNT_ID: ${{ inputs.openai_account_id }}
      INPUT_OPENAI_ACCOUNT_IDS: ${{ inputs.openai_account_ids }}
      INPUT_OPENAI_ACCOUNT_ROTATION: ${{ inputs.openai_account_rotation }}
      INPUT_OPENAI_ACCOUNT_FAILOVER: ${{ inputs.openai_account_failover }}
      INPUT_USAGE_BUDGET_GUARD: ${{ inputs.usage_budget_guard }}
      INPUT_USAGE_BUDGET_ALLOW_CREDITS: ${{ inputs.usage_budget_allow_credits }}
      INPUT_USAGE_BUDGET_ALLOW_WEEKLY_LIMIT: ${{ inputs.usage_budget_allow_weekly_limit }}
      INPUT_REPO: ${{ inputs.repo }}
      INPUT_PR_NUMBER: ${{ inputs.pr_number }}
      INPUT_PROFILE: ${{ inputs.profile }}
      INPUT_STYLE: ${{ inputs.style }}
      INPUT_OUTPUT_STYLE: ${{ inputs.output_style }}
      INPUT_STRICTNESS: ${{ inputs.strictness }}
      INPUT_TONE: ${{ inputs.tone }}
      INPUT_FOCUS: ${{ inputs.focus }}
      INPUT_LENGTH: ${{ inputs.length }}
      INPUT_MODE: ${{ inputs.mode }}
      INPUT_PERSONA: ${{ inputs.persona }}
      INPUT_NOTES: ${{ inputs.notes }}
      INPUT_CI_CONTEXT_ENABLED: ${{ inputs.ci_context_enabled }}
      INPUT_CI_CONTEXT_INCLUDE_CHECK_SUMMARY: ${{ inputs.ci_context_include_check_summary }}
      INPUT_CI_CONTEXT_INCLUDE_FAILED_RUNS: ${{ inputs.ci_context_include_failed_runs }}
      INPUT_CI_CONTEXT_INCLUDE_FAILURE_SNIPPETS: ${{ inputs.ci_context_include_failure_snippets }}
      INPUT_CI_CONTEXT_MAX_FAILED_RUNS: ${{ inputs.ci_context_max_failed_runs }}
      INPUT_CI_CONTEXT_MAX_SNIPPET_CHARS_PER_RUN: ${{ inputs.ci_context_max_snippet_chars_per_run }}
      INPUT_CI_CONTEXT_CLASSIFY_INFRA_FAILURES: ${{ inputs.ci_context_classify_infra_failures }}
      INPUT_REVIEWED_CHANGES: ${{ inputs.reviewed_changes }}
      INPUT_HISTORY_ENABLED: ${{ inputs.history_enabled }}
      INPUT_HISTORY_INCLUDE_IX_SUMMARY_HISTORY: ${{ inputs.history_include_ix_summary_history }}
      INPUT_HISTORY_INCLUDE_REVIEW_THREADS: ${{ inputs.history_include_review_threads }}
      INPUT_HISTORY_INCLUDE_EXTERNAL_BOT_SUMMARIES: ${{ inputs.history_include_external_bot_summaries }}
      INPUT_HISTORY_EXTERNAL_BOT_LOGINS: ${{ inputs.history_external_bot_logins }}
      INPUT_HISTORY_ARTIFACTS: ${{ inputs.history_artifacts }}
      INPUT_HISTORY_MAX_ROUNDS: ${{ inputs.history_max_rounds }}
      INPUT_HISTORY_MAX_ITEMS: ${{ inputs.history_max_items }}
      INPUT_SWARM_ENABLED: ${{ inputs.swarm_enabled }}
      INPUT_SWARM_SHADOW_MODE: ${{ inputs.swarm_shadow_mode }}
      INPUT_SWARM_REVIEWERS: ${{ inputs.swarm_reviewers }}
      INPUT_SWARM_MAX_PARALLEL: ${{ inputs.swarm_max_parallel }}
      INPUT_SWARM_PUBLISH_SUBREVIEWS: ${{ inputs.swarm_publish_subreviews }}
      INPUT_SWARM_AGGREGATOR_MODEL: ${{ inputs.swarm_aggregator_model }}
      INPUT_SWARM_FAIL_OPEN_ON_PARTIAL: ${{ inputs.swarm_fail_open_on_partial }}
      INPUT_SWARM_METRICS: ${{ inputs.swarm_metrics }}
      INPUT_COMMENT_MODE: ${{ inputs.comment_mode }}
      INPUT_PROGRESS_UPDATES: ${{ inputs.progress_updates }}
      INPUT_PROGRESS_UPDATE_SECONDS: ${{ inputs.progress_update_seconds }}
      INPUT_PROGRESS_PREVIEW_CHARS: ${{ inputs.progress_preview_chars }}
      INPUT_DIAGNOSTICS: ${{ inputs.diagnostics }}
      REVIEW_FAIL_OPEN: true
      REVIEW_FAIL_OPEN_TRANSIENT_ONLY: false
      INPUT_PREFLIGHT: ${{ inputs.preflight }}
      INPUT_PREFLIGHT_TIMEOUT_SECONDS: ${{ inputs.preflight_timeout_seconds }}
      INPUT_SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
      INPUT_WAIT_SECONDS: ${{ inputs.wait_seconds }}
      INPUT_IDLE_SECONDS: ${{ inputs.idle_seconds }}
      INPUT_SKIP_DRAFT: ${{ inputs.skip_draft }}
      INPUT_SKIP_TITLES: ${{ inputs.skip_titles }}
      INPUT_SKIP_LABELS: ${{ inputs.skip_labels }}
      INPUT_SKIP_PATHS: ${{ inputs.skip_paths }}
      INPUT_REDACT_PII: ${{ inputs.redact_pii }}
      INPUT_REDACTION_PATTERNS: ${{ inputs.redaction_patterns }}
      INPUT_REDACTION_REPLACEMENT: ${{ inputs.redaction_replacement }}
      INPUT_CLEANUP_ENABLED: ${{ inputs.cleanup_enabled }}
      INPUT_CLEANUP_MODE: ${{ inputs.cleanup_mode }}
      INPUT_CLEANUP_SCOPE: ${{ inputs.cleanup_scope }}
      INPUT_CLEANUP_REQUIRE_LABEL: ${{ inputs.cleanup_require_label }}
      INPUT_CLEANUP_MIN_CONFIDENCE: ${{ inputs.cleanup_min_confidence }}
      INPUT_CLEANUP_ALLOWED_EDITS: ${{ inputs.cleanup_allowed_edits }}
      INPUT_CLEANUP_TEMPLATE: ${{ inputs.cleanup_template }}
      INPUT_CLEANUP_TEMPLATE_PATH: ${{ inputs.cleanup_template_path }}
      INPUT_CLEANUP_POST_EDIT_COMMENT: ${{ inputs.cleanup_post_edit_comment }}
      INPUT_INCLUDE_ISSUE_COMMENTS: ${{ inputs.include_issue_comments }}
      INPUT_INCLUDE_REVIEW_COMMENTS: ${{ inputs.include_review_comments }}
      INPUT_MAX_COMMENT_CHARS: ${{ inputs.max_comment_chars }}
      INPUT_MAX_COMMENTS: ${{ inputs.max_comments }}
      INPUT_INCLUDE_RELATED_PRS: ${{ inputs.include_related_prs }}
      INPUT_RELATED_PRS_QUERY: ${{ inputs.related_prs_query }}
      INPUT_MAX_RELATED_PRS: ${{ inputs.max_related_prs }}
      INPUT_PROMPT_TEMPLATE_PATH: ${{ inputs.prompt_template_path }}
      INPUT_SUMMARY_TEMPLATE_PATH: ${{ inputs.summary_template_path }}
      REVIEW_CONFIG_PATH: ${{ inputs.review_config_path }}
      CODEX_APP_SERVER_PATH: ${{ inputs.codex_path }}
      CODEX_APP_SERVER_ARGS: ${{ inputs.codex_args }}
      CODEX_APP_SERVER_CWD: ${{ inputs.codex_cwd }}
      COPILOT_CLI_PATH: ${{ inputs.copilot_cli_path }}
      COPILOT_CLI_URL: ${{ inputs.copilot_cli_url }}
      COPILOT_CLI_WORKDIR: ${{ inputs.copilot_cli_workdir }}
      COPILOT_AUTO_INSTALL: ${{ inputs.copilot_auto_install }}
      COPILOT_AUTO_INSTALL_METHOD: ${{ inputs.copilot_auto_install_method }}
      COPILOT_AUTO_INSTALL_PRERELEASE: ${{ inputs.copilot_auto_install_prerelease }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Create GitHub App token
        id: app_token
        if: ${{ env.INTELLIGENCEX_APP_ID != '' && env.INTELLIGENCEX_APP_KEY != '' }}
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ env.INTELLIGENCEX_APP_ID }}
          private-key: ${{ env.INTELLIGENCEX_APP_KEY }}
      - name: Apply optional reviewer config overrides
        shell: bash
        env:
          AUTO_APPROVE_ENABLED: ${{ inputs.auto_approve_enabled }}
          AUTO_APPROVE_DRY_RUN: ${{ inputs.auto_approve_dry_run }}
          AUTO_APPROVE_REQUIRED_LABELS: ${{ inputs.auto_approve_required_labels }}
          AUTO_APPROVE_ALLOWED_AUTHORS: ${{ inputs.auto_approve_allowed_authors }}
          AUTO_APPROVE_IGNORED_CHECK_NAMES: ${{ inputs.auto_approve_ignored_check_names }}
          SKIP_AUTHORS: ${{ inputs.skip_authors }}
          FORCE_REVIEW_LABELS: ${{ inputs.force_review_labels }}
          MAX_FILES: ${{ inputs.max_files }}
          MAX_PATCH_CHARS: ${{ inputs.max_patch_chars }}
          MAX_INLINE_COMMENTS: ${{ inputs.max_inline_comments }}
        run: |
          set -euo pipefail
          add_if_set() {
            local name="$1"
            local value="$2"
            if [ -n "${value//[[:space:]]/}" ]; then
              printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
            fi
          }

          add_if_set INPUT_AUTO_APPROVE_ENABLED "$AUTO_APPROVE_ENABLED"
          add_if_set INPUT_AUTO_APPROVE_DRY_RUN "$AUTO_APPROVE_DRY_RUN"
          add_if_set INPUT_AUTO_APPROVE_REQUIRED_LABELS "$AUTO_APPROVE_REQUIRED_LABELS"
          add_if_set INPUT_AUTO_APPROVE_ALLOWED_AUTHORS "$AUTO_APPROVE_ALLOWED_AUTHORS"
          add_if_set INPUT_AUTO_APPROVE_IGNORED_CHECK_NAMES "$AUTO_APPROVE_IGNORED_CHECK_NAMES"
          add_if_set INPUT_SKIP_AUTHORS "$SKIP_AUTHORS"
          add_if_set INPUT_FORCE_REVIEW_LABELS "$FORCE_REVIEW_LABELS"
          add_if_set INPUT_MAX_FILES "$MAX_FILES"
          add_if_set INPUT_MAX_PATCH_CHARS "$MAX_PATCH_CHARS"
          add_if_set INPUT_MAX_INLINE_COMMENTS "$MAX_INLINE_COMMENTS"
      - name: Resolve reviewer release
        if: ${{ inputs.reviewer_source == 'release' && inputs.reviewer_release_url == '' }}
        id: reviewer_release
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const repoInput = '${{ inputs.reviewer_release_repo }}';
            const parts = repoInput.split('/');
            if (parts.length !== 2) {
              core.setFailed(`Invalid reviewer_release_repo: ${repoInput}`);
              return;
            }
            const [owner, repo] = parts;
            const tag = '${{ inputs.reviewer_release_tag }}';
            const os = process.env.RUNNER_OS;
            const defaultName = os === 'Windows'
              ? 'IntelligenceX.Reviewer-win-x64.zip'
              : os === 'macOS'
                ? 'IntelligenceX.Reviewer-osx-x64.zip'
                : 'IntelligenceX.Reviewer-linux-x64.zip';
            const assetName = '${{ inputs.reviewer_release_asset }}' || defaultName;
            const release = tag && tag !== 'latest'
              ? await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              : await github.rest.repos.getLatestRelease({ owner, repo });
            const asset = release.data.assets.find(a => a.name === assetName);
            if (!asset) {
              core.setFailed(`Asset not found: ${assetName}`);
              return;
            }
            core.setOutput('asset_url', asset.browser_download_url);
      - name: Download reviewer (unix)
        if: ${{ inputs.reviewer_source == 'release' && runner.os != 'Windows' }}
        id: reviewer_download_unix
        continue-on-error: true
        env:
          REVIEWER_ASSET_URL: ${{ inputs.reviewer_release_url != '' && inputs.reviewer_release_url || steps.reviewer_release.outputs.asset_url }}
        shell: bash
        run: |
          mkdir -p reviewer-release
          curl -L "$REVIEWER_ASSET_URL" -o reviewer-release/reviewer.zip
          unzip -o reviewer-release/reviewer.zip -d reviewer-release
      - name: Download reviewer (windows)
        if: ${{ inputs.reviewer_source == 'release' && runner.os == 'Windows' }}
        id: reviewer_download_windows
        continue-on-error: true
        env:
          REVIEWER_ASSET_URL: ${{ inputs.reviewer_release_url != '' && inputs.reviewer_release_url || steps.reviewer_release.outputs.asset_url }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path reviewer-release -Force | Out-Null
          Invoke-WebRequest -Uri $env:REVIEWER_ASSET_URL -OutFile reviewer-release/reviewer.zip
          Expand-Archive -Path reviewer-release/reviewer.zip -DestinationPath reviewer-release -Force
      - name: Build IntelligenceX.Reviewer
        if: ${{ inputs.reviewer_source == 'source' }}
        id: reviewer_build
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          log_path="artifacts/reviewer-run-source.log"
          : > "$log_path"
          set +e
          dotnet build IntelligenceX.Reviewer/IntelligenceX.Reviewer.csproj -c Release -f net8.0 2>&1 | tee "$log_path"
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "::warning title=IntelligenceX reviewer build failed::Source reviewer build exited with $exit_code. The workflow will summarize this without failing the overall fail-open review job."
          fi
          exit 0
      - name: Prepare static analysis context
        shell: bash
        run: |
          set -euo pipefail
          config='${{ inputs.review_config_path }}'
          if [ -z "$config" ]; then config=".intelligencex/reviewer.json"; fi
          echo "IX_REVIEW_CONFIG_PATH=$config" >> "$GITHUB_ENV"
          mkdir -p artifacts
          : > artifacts/changed-files.txt
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if ! git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > artifacts/changed-files.txt; then
              echo "Warning: failed to compute changed-files from PR SHAs; trying merge-parent fallback." >&2
              : > artifacts/changed-files.txt
              if git rev-parse --verify HEAD^1 >/dev/null 2>&1 && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
                if ! git diff --name-only HEAD^1 HEAD^2 > artifacts/changed-files.txt; then
                  : > artifacts/changed-files.txt
                fi
              fi
              if [ ! -s artifacts/changed-files.txt ]; then
                echo "Warning: changed-files fallback unavailable; continuing with full gate scope." >&2
              fi
            fi
          fi
      - name: Run IntelligenceX analysis (pre-review, best-effort)
        id: analysis_pre_run
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          if [ ! -f "$IX_REVIEW_CONFIG_PATH" ]; then
            echo "Static analysis pre-run skipped: config '$IX_REVIEW_CONFIG_PATH' not found."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f IntelligenceX.Cli/IntelligenceX.Cli.csproj ]; then
            echo "Static analysis pre-run skipped: IntelligenceX.Cli source project is not available in this checkout."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -c Release -f net8.0 -p:EnableWindowsTargeting=true -- analyze run --workspace . --config "$IX_REVIEW_CONFIG_PATH"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "::warning title=IntelligenceX analysis pre-run failed::Best-effort analysis exited with $exit_code. The enforcing analysis gate still runs separately."
          fi
          exit 0
      - name: Evaluate IntelligenceX analysis gate (pre-review, enforcing)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$IX_REVIEW_CONFIG_PATH" ]; then
            echo "Static analysis gate skipped: config '$IX_REVIEW_CONFIG_PATH' not found."
            exit 0
          fi
          if [ ! -f IntelligenceX.Cli/IntelligenceX.Cli.csproj ]; then
            echo "Static analysis gate skipped: IntelligenceX.Cli source project is not available in this checkout."
            exit 0
          fi
          if [ -s artifacts/changed-files.txt ]; then
            dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -c Release -f net8.0 -p:EnableWindowsTargeting=true -- analyze gate --workspace . --config "$IX_REVIEW_CONFIG_PATH" --changed-files artifacts/changed-files.txt
          else
            dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -c Release -f net8.0 -p:EnableWindowsTargeting=true -- analyze gate --workspace . --config "$IX_REVIEW_CONFIG_PATH"
          fi
      - name: Run IntelligenceX.Reviewer (source)
        if: ${{ inputs.reviewer_source == 'source' && steps.reviewer_build.outputs.exit_code == '0' }}
        id: reviewer_run_source
        continue-on-error: true
        env:
          INTELLIGENCEX_GITHUB_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          log_path="artifacts/reviewer-run-source.log"
          : > "$log_path"
          set +e
          dotnet run --project IntelligenceX.Reviewer/IntelligenceX.Reviewer.csproj -c Release -f net8.0 2>&1 | tee "$log_path"
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "::warning title=IntelligenceX reviewer exited non-zero::Source reviewer exited with $exit_code. Check the reviewer summary below and the captured log artifact."
          fi
          exit 0
      - name: Run IntelligenceX.Reviewer (release, unix)
        if: ${{ inputs.reviewer_source == 'release' && runner.os != 'Windows' && steps.reviewer_download_unix.outcome == 'success' }}
        id: reviewer_run_release_unix
        continue-on-error: true
        env:
          INTELLIGENCEX_GITHUB_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          log_path="artifacts/reviewer-run-release-unix.log"
          : > "$log_path"
          reviewer_dll=$(find reviewer-release -type f -name IntelligenceX.Reviewer.dll | head -n 1)
          if [ -z "$reviewer_dll" ]; then
            echo "Reviewer DLL not found under reviewer-release."
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            echo "::warning title=IntelligenceX reviewer unavailable::Reviewer DLL was not found under reviewer-release."
            exit 0
          fi
          set +e
          dotnet "$reviewer_dll" 2>&1 | tee "$log_path"
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "::warning title=IntelligenceX reviewer exited non-zero::Release reviewer exited with $exit_code. Check the reviewer summary below and the captured log artifact."
          fi
          exit 0
      - name: Run IntelligenceX.Reviewer (release, windows)
        if: ${{ inputs.reviewer_source == 'release' && runner.os == 'Windows' && steps.reviewer_download_windows.outcome == 'success' }}
        id: reviewer_run_release_windows
        continue-on-error: true
        env:
          INTELLIGENCEX_GITHUB_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $logPath = "artifacts/reviewer-run-release-windows.log"
          $reviewer = Get-ChildItem -Path reviewer-release -Recurse -Filter IntelligenceX.Reviewer.dll | Select-Object -First 1
          if (-not $reviewer) {
            Write-Warning "Reviewer DLL not found under reviewer-release."
            "exit_code=1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          $output = & dotnet $reviewer.FullName 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath $logPath
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($exitCode -ne 0) {
            Write-Warning "IntelligenceX release reviewer exited with $exitCode. Check the reviewer summary below and the captured log artifact."
          }
          exit 0
      - name: Finalize fail-open reviewer summary
        if: >-
          ${{
            always() &&
            (
              steps.reviewer_build.outputs.exit_code != '' && steps.reviewer_build.outputs.exit_code != '0' ||
              steps.reviewer_run_source.outputs.exit_code != '' && steps.reviewer_run_source.outputs.exit_code != '0' ||
              steps.reviewer_run_release_unix.outputs.exit_code != '' && steps.reviewer_run_release_unix.outputs.exit_code != '0' ||
              steps.reviewer_run_release_windows.outputs.exit_code != '' && steps.reviewer_run_release_windows.outputs.exit_code != '0'
            )
          }}
        continue-on-error: true
        env:
          INTELLIGENCEX_GITHUB_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ ! -f IntelligenceX.Cli/IntelligenceX.Cli.csproj ]; then
            echo "Fail-open reviewer summary skipped: IntelligenceX.Cli source project is not available in this checkout."
            exit 0
          fi
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -c Release -f net8.0 -- ci review-fail-open-summary \
            --reviewer-source "${{ inputs.reviewer_source }}" \
            --repo "${{ inputs.repo }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --source-log artifacts/reviewer-run-source.log \
            --release-unix-log artifacts/reviewer-run-release-unix.log \
            --release-windows-log artifacts/reviewer-run-release-windows.log

      - name: Write reviewer Actions summary
        if: ${{ always() }}
        shell: bash
        run: |
          if [ ! -f IntelligenceX.Cli/IntelligenceX.Cli.csproj ]; then
            echo "Reviewer Actions summary skipped: IntelligenceX.Cli source project is not available in this checkout."
            exit 0
          fi
          dotnet run --project IntelligenceX.Cli/IntelligenceX.Cli.csproj -c Release -f net8.0 -- ci reviewer-run-summary \
            --source-build-outcome "${{ steps.reviewer_build.outcome }}" \
            --source-build-exit "${{ steps.reviewer_build.outputs.exit_code }}" \
            --analysis-pre-run-outcome "${{ steps.analysis_pre_run.outcome }}" \
            --analysis-pre-run-exit "${{ steps.analysis_pre_run.outputs.exit_code }}" \
            --source-reviewer-outcome "${{ steps.reviewer_run_source.outcome }}" \
            --source-reviewer-exit "${{ steps.reviewer_run_source.outputs.exit_code }}" \
            --release-unix-outcome "${{ steps.reviewer_run_release_unix.outcome }}" \
            --release-unix-exit "${{ steps.reviewer_run_release_unix.outputs.exit_code }}" \
            --release-windows-outcome "${{ steps.reviewer_run_release_windows.outcome }}" \
            --release-windows-exit "${{ steps.reviewer_run_release_windows.outputs.exit_code }}"

      - name: Upload reviewer artifacts
        if: ${{ always() && hashFiles('artifacts/reviewer/**') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: intelligencex-reviewer-artifacts
          path: artifacts/reviewer
