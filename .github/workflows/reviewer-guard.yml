name: Reviewer Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - .github/workflows/review-intelligencex.yml
      - .github/workflows/reviewer-guard.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  reviewer-guard:
    runs-on: [self-hosted, ubuntu]
    steps:
      - name: Validate IntelligenceX Reviewer Run
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request?.title ?? "";
            const isDraft = Boolean(context.payload.pull_request?.draft);
            const hasSkipMarker = /\[(wip|skip-review)\]/i.test(title);
            if (isDraft || hasSkipMarker) {
              core.notice(`Skipping reviewer guard (draft=${isDraft}, skip_marker=${hasSkipMarker}).`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request.head.sha;
            const headBranch = context.payload.pull_request.head.ref;
            const action = context.payload.action ?? "unknown";
            const prUpdatedAtMs = Date.parse(context.payload.pull_request?.updated_at ?? "");
            const prCreatedAtMs = Date.parse(context.payload.pull_request?.created_at ?? "");
            const triggerAtMs = Number.isFinite(prUpdatedAtMs)
              ? prUpdatedAtMs
              : (Number.isFinite(prCreatedAtMs) ? prCreatedAtMs : Date.now());
            const triggerWindowSkewMs = 2 * 60 * 1000;
            const triggerWindowStartMs = triggerAtMs - triggerWindowSkewMs;
            const maxAttempts = 40;
            const pollMs = 15000;

            core.info(`Scoping reviewer runs for action=${action}, branch=${headBranch}, head_sha=${headSha}, trigger_window_start=${new Date(triggerWindowStartMs).toISOString()}.`);

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: "review-intelligencex.yml",
                event: "pull_request",
                branch: headBranch,
                head_sha: headSha,
                per_page: 20
              });

              const workflowRuns = (runs.data.workflow_runs || [])
                .filter(run => {
                  const createdAtMs = Date.parse(run.created_at ?? "");
                  return Number.isFinite(createdAtMs) && createdAtMs >= triggerWindowStartMs;
                });
              if (workflowRuns.length > 0) {
                const latest = workflowRuns
                  .slice()
                  .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at))[0];

                core.info(`Found reviewer run ${latest.id} status=${latest.status} conclusion=${latest.conclusion ?? "n/a"}.`);

                if (latest.status === "completed") {
                  if (latest.conclusion === "success") {
                    return;
                  }

                  core.setFailed(`IntelligenceX Review run ${latest.id} completed with conclusion=${latest.conclusion}.`);
                  return;
                }
              } else {
                core.info("No scoped IntelligenceX Review run found yet for this trigger window.");
              }

              await new Promise(resolve => setTimeout(resolve, pollMs));
            }

            core.setFailed("Timed out waiting for IntelligenceX Review run to complete successfully.");
