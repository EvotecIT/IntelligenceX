name: Claude Code Review

on:
  # Disabled (no automatic triggers).
  workflow_dispatch:

jobs:
  claude-review:
    if: ${{ false }}
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
    # When public, use GitHub-hosted runners by default.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      # Ensure gh never prompts for auth (which can hang CI).
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Detect workflow file changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            claude_workflows:
              - '.github/workflows/claude-code-review.yml'
              - '.github/workflows/claude.yml'

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Ensure GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.changes.outputs.claude_workflows != 'true' && secrets.CLAUDE_CODE_OAUTH_TOKEN != ''
        continue-on-error: true
        uses: anthropics/claude-code-action@b433f16b30d54063fd3bab6b12f46f3da00e41b6 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices (.NET/PowerShell)
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions.

            Output format (use these headings exactly):
            - Summary 📝
            - Todo List ✅ (merge blockers; markdown checkboxes; if none, write "None.")
            - Critical Issues ⚠️ (merge blockers; markdown checkboxes; if none, write "None.")
            - Other Issues 🧯 (non-blocking; bullet list, no checkboxes)
            - Tests / Coverage 🧪 (non-blocking)
            - Next Steps 🚀 (non-blocking)

            Rules:
            - Only use markdown task list items (`- [ ] ...`, `- [x] ...`) in Todo List and Critical Issues.
            - Do not add style-only nits as merge blockers.
            - Keep items actionable and specific.

            Do not post comments yourself (do not call `gh pr comment`). Output your review in Markdown; the workflow will post/update it as a single sticky PR comment.
          use_sticky_comment: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

      - name: Skip Claude Code Review (not configured)
        if: steps.changes.outputs.claude_workflows != 'true' && secrets.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: echo "Skipping Claude Code Review because CLAUDE_CODE_OAUTH_TOKEN is not configured."

      - name: Skip Claude Code Review (workflow modified in PR)
        if: steps.changes.outputs.claude_workflows == 'true'
        run: echo "Skipping Claude Code Review because the Claude workflow file changed in this PR (GitHub app token validation would fail)."
