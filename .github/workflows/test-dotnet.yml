name: Test .NET Libraries

on:
    push:
        branches:
            - master
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    pull_request:
    workflow_dispatch:

env:
    DOTNET_VERSION: |
        8.x
        10.0.x
    BUILD_CONFIGURATION: 'Release'

jobs:
    test-windows:
        name: 'Windows'
        # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
        # When public, use GitHub-hosted runners by default.
        runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","Windows"]' || '["windows-latest"]') }}
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup .NET
              uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: always()
              with:
                  name: test-results-windows
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: ${{ always() && hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  name: coverage-reports-windows
                  path: '**/coverage.cobertura.xml'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

    test-ubuntu:
        name: 'Ubuntu'
        # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
        # When public, use GitHub-hosted runners by default.
        runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup .NET
              uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: always()
              with:
                  name: test-results-ubuntu
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

    test-macos:
        name: 'macOS'
        # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
        # When public, use GitHub-hosted runners by default.
        runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","macOS"]' || '["macos-latest"]') }}
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup .NET
              uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              if: always()
              with:
                  name: test-results-macos
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true
