name: Test .NET Libraries

on:
    push:
        branches:
            - master
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    pull_request:
    workflow_dispatch:

env:
    DOTNET_VERSION: |
        8.x
        10.0.x
    BUILD_CONFIGURATION: 'Release'

    jobs:
        test-windows:
            name: 'Windows'
            # While private, only run Windows tests if you have a self-hosted Windows runner configured.
            if: ${{ !github.event.repository.private || vars.IX_ENABLE_WINDOWS_SELF_HOSTED == 'true' }}
            # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
            # When public, use GitHub-hosted runners by default.
            runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_ENABLE_WINDOWS_SELF_HOSTED == 'true') && '["self-hosted","windows"]' || '["windows-latest"]') }}
            timeout-minutes: 20
            steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup .NET
              uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: always()
              with:
                  name: test-results-windows
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: ${{ always() && hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  name: coverage-reports-windows
                  path: '**/coverage.cobertura.xml'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

    test-ubuntu:
        name: 'Ubuntu'
        # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
        # When public, use GitHub-hosted runners by default.
        runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","ubuntu"]' || '["ubuntu-latest"]') }}
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup .NET
              uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: always()
              with:
                  name: test-results-ubuntu
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

        test-macos:
            name: 'macOS'
            # While private, only run macOS tests if you have a self-hosted macOS runner configured.
            if: ${{ !github.event.repository.private || vars.IX_ENABLE_MACOS_SELF_HOSTED == 'true' }}
            # While the repo is private, prefer self-hosted runners to avoid GitHub-hosted spend limits.
            # When public, use GitHub-hosted runners by default.
            runs-on: ${{ fromJSON((github.event.repository.private && vars.IX_ENABLE_MACOS_SELF_HOSTED == 'true') && '["self-hosted","macos"]' || '["macos-latest"]') }}
            timeout-minutes: 20
            steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup .NET
              uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet ./IntelligenceX.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net10.0/IntelligenceX.Tests.dll
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: always()
              with:
                  name: test-results-macos
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3
              if: ${{ hashFiles('**/coverage.cobertura.xml') != '' }}
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true
