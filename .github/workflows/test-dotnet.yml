name: Test .NET Libraries

on:
    push:
        branches:
            - master
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    pull_request:
    workflow_dispatch:

env:
    DOTNET_VERSION: |
        8.x
        10.0.x
    BUILD_CONFIGURATION: 'Release'

jobs:
    test-windows:
        name: 'Windows'
        runs-on: [self-hosted, windows]
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net8.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net10.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-windows
                  path: '**/*.trx'

            - name: Upload coverage reports
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-reports-windows
                  path: '**/coverage.cobertura.xml'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

    test-ubuntu:
        name: 'Ubuntu'
        runs-on: [self-hosted, ubuntu]
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net8.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net10.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-ubuntu
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true

    test-macos:
        name: 'macOS'
        runs-on: [self-hosted, macos]
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore dependencies
              run: dotnet restore IntelligenceX.sln

            - name: Build solution
              run: dotnet build IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run tests
              run: dotnet test IntelligenceX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
              timeout-minutes: 10

            - name: Run executable test harness (net8.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net8.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Run executable test harness (net10.0)
              run: dotnet run --project IntelligenceX.Tests/IntelligenceX.Tests.csproj --framework net10.0 --configuration ${{ env.BUILD_CONFIGURATION }}
              timeout-minutes: 10

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-macos
                  path: '**/*.trx'
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: '**/coverage.cobertura.xml'
                  fail_ci_if_error: false
                  verbose: true
