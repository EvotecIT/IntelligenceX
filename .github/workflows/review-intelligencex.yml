name: IntelligenceX Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  # INTELLIGENCEX:BEGIN
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: evotecit/github-actions/.github/workflows/review-intelligencex.yml@master
    with:
      runs_on: '["self-hosted","ubuntu"]'
      reviewer_source: release
      reviewer_release_repo: EvotecIT/github-actions
      reviewer_release_tag: latest
      provider: openai
      model: gpt-5.2-codex
      openai_transport: native
      include_issue_comments: true
      include_review_comments: true
      include_related_prs: true
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INTELLIGENCEX_AUTH_B64: ${{ secrets.INTELLIGENCEX_AUTH_B64 }}
  # INTELLIGENCEX:END
