name: IntelligenceX Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  # INTELLIGENCEX:BEGIN
  review:
    uses: evotecit/github-actions/.github/workflows/review-intelligencex.yml/.github/workflows/review-intelligencex.yml@main
    with:
      runs_on: '["self-hosted","ubuntu"]'
      provider: openai
      model: gpt-5.2-codex
      openai_transport: native
      include_issue_comments: true
      include_review_comments: true
      include_related_prs: true
    secrets:
      GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
      INTELLIGENCEX_AUTH_B64: ${ secrets.INTELLIGENCEX_AUTH_B64 }
  # INTELLIGENCEX:END
