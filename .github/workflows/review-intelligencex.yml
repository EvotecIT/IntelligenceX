name: IntelligenceX Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository (owner/name) for manual runs'
        required: false
        default: ''
      pr_number:
        description: 'Pull request number for manual runs'
        required: false
        default: ''

jobs:
  # INTELLIGENCEX:BEGIN
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: evotecit/github-actions/.github/workflows/review-intelligencex.yml@master
    with:
      runs_on: '["self-hosted","ubuntu"]'
      reviewer_source: source
      
      
      repo: ${{ github.event.pull_request.number && github.repository || inputs.repo }}
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      provider: openai
      model: gpt-5.3-codex
      openai_transport: native
      review_config_path: .intelligencex/reviewer.json
      mode: hybrid
      length: medium
      style: direct
      include_issue_comments: true
      include_review_comments: true
      include_related_prs: true
      progress_updates: true
      diagnostics: false
      preflight: false
      preflight_timeout_seconds: 15
      cleanup_enabled: false
      cleanup_mode: comment
      cleanup_scope: pr
      cleanup_require_label: ''
      cleanup_min_confidence: 0.85
      cleanup_allowed_edits: 'formatting,grammar,title,sections'
      cleanup_post_edit_comment: true
    secrets: inherit
  # INTELLIGENCEX:END
