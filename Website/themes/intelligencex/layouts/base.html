<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | IntelligenceX</title>
  {{ description_meta_html }}
  {{ canonical_html }}
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  {{ assets.critical_css_html }}
  {{ include "theme-tokens" }}
  {{ extra_css_html }}
  {{ assets.css_html }}
</head>
<body>
  {{ include "header" }}
  <main class="ix-main">
    <div class="ix-container">
    <div class="ix-content">
{{ content }}
    </div>
    </div>
  </main>
  {{ include "footer" }}
  {{ assets.js_html }}
  {{ extra_scripts_html }}
</body>
</html>
