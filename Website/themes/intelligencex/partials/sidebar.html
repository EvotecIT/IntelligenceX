<nav class="docs-nav" aria-label="Documentation">
  {{ if toc_tree }}
    {{ for section in toc_tree }}
      {{ if section.items }}
        <div class="docs-nav-group">
          <h3 class="docs-nav-heading">{{ section.title }}</h3>
          <ul class="docs-nav-list">
            {{ for item in section.items }}
              <li><a href="{{ item.href }}" class="docs-nav-item{{ if page.url == item.href }} active{{ end }}">{{ item.title }}</a></li>
            {{ end }}
          </ul>
        </div>
      {{ else }}
        <a href="{{ section.href }}" class="docs-nav-item docs-nav-top{{ if page.url == section.href }} active{{ end }}">{{ section.title }}</a>
      {{ end }}
    {{ end }}
  {{ end }}
</nav>
