<script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)})()</script>
<style>
:root {
  --pf-bg: #0A0E1A;
  --pf-bg-alt: #111827;
  --pf-panel: rgba(30, 41, 59, 0.85);
  --pf-ink: #F1F5F9;
  --pf-ink-strong: #FFFFFF;
  --pf-muted: #94A3B8;
  --pf-accent: #00D9FF;
  --pf-accent2: #8B5CF6;
  --pf-border: rgba(51, 65, 85, 0.6);
  --pf-header-bg: rgba(10, 14, 26, 0.8);
  --pf-card-bg: rgba(30, 41, 59, 0.6);
  --pf-code-bg: #0D1117;
  --pf-code-border: rgba(71, 85, 105, 0.5);
  --pf-btn-primary-bg: #00D9FF;
  --pf-btn-primary-text: #062A38;
  --pf-btn-ghost-border: rgba(148, 163, 184, 0.4);
  --pf-radius-sm: 8px;
  --pf-shadow-button: 0 8px 24px rgba(0, 217, 255, 0.15);
  --pf-success: #10B981;
  --pf-max-width: 1200px;
  --pf-font-body: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
  --pf-font-display: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
  --pf-font-mono: JetBrains Mono, Consolas, monospace;
}

[data-theme="light"] {
  --pf-bg: #F8FAFC;
  --pf-bg-alt: #F1F5F9;
  --pf-panel: rgba(255, 255, 255, 0.85);
  --pf-ink: #1E293B;
  --pf-ink-strong: #0F172A;
  --pf-muted: #475569;
  --pf-accent: #0B6078;
  --pf-accent2: #7C3AED;
  --pf-border: rgba(148, 163, 184, 0.4);
  --pf-header-bg: rgba(248, 250, 252, 0.85);
  --pf-card-bg: rgba(255, 255, 255, 0.7);
  --pf-code-bg: #F1F5F9;
  --pf-code-border: rgba(148, 163, 184, 0.4);
  --pf-btn-primary-bg: #0E7490;
  --pf-btn-primary-text: #F8FAFC;
  --pf-btn-ghost-border: rgba(100, 116, 139, 0.3);
  --pf-shadow-button: 0 8px 24px rgba(8, 145, 178, 0.12);
  --pf-success: #059669;
}

/* API docs fragments inject plain <a> tags (no theme-specific classes). */
.ix-nav-links a { font-size: 0.9rem; font-weight: 500; color: var(--pf-muted); text-decoration: none; transition: color 0.2s; }
.ix-nav-links a:hover { color: var(--pf-accent); }
.ix-actions .nav-cta { background: #7DD3FC !important; background-color: #7DD3FC !important; border: 1px solid #0E7490 !important; color: #0B1220 !important; }
.ix-actions .nav-cta:hover { background: #67E8F9 !important; background-color: #67E8F9 !important; color: #0B1220 !important; }
</style>
<header class="ix-header">
  <div class="ix-header-inner">
    <a href="/" class="ix-brand">
      <svg class="ix-logo" viewBox="0 0 32 32" width="28" height="28" fill="none">
        <rect width="32" height="32" rx="8" fill="var(--pf-accent)"/>
        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="var(--pf-bg)" font-family="var(--pf-font-display)" font-weight="700" font-size="18">IX</text>
      </svg>
      <span>IntelligenceX</span>
    </a>

    <button class="ix-nav-toggle" type="button" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <nav class="ix-nav" aria-label="Main navigation">
      <div class="ix-nav-links">
        {{NAV_LINKS}}
      </div>
      <div class="ix-actions">
        <button class="ix-theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        {{NAV_ACTIONS}}
      </div>
    </nav>
  </div>
</header>
